name: Tests

# Until this existed (2026-07-17) the repo had 196 tests and NOTHING ran them.
# Every guarantee in scripts/invoices/ -- the cost guard, the sanity bounds,
# the Alehouse check -- was enforced by nobody. A regression would have shipped
# green, because there was no green.
#
# This workflow is the only thing standing between a bad number and
# app.stowawaybar.com. Keep it fast so it never becomes the thing people skip.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install
        run: pip install -r requirements.txt

      - name: Tests (pytest)
        run: python3 -m pytest

      - name: Tests (script-shaped)
        # test_mari_recovery.py is a real test that runs as a script and signals
        # via exit code. pytest cannot collect it (it sys.exits at import), so
        # run it the way it was built to run rather than rewrite a working test
        # to suit a runner. See pyproject.toml.
        #
        # scripts/test_pipeline.py is deliberately NOT here: it needs
        # .drive-staging CSVs that are not in the repo, so it cannot run on a
        # clean checkout. It is superseded by test_mari_recovery.py. See its
        # docstring.
        run: python3 scripts/test_mari_recovery.py

      - name: Deterministic feeds must rebuild identically
        # data/costs.csv is derived from data/cogs_list.csv with no clock in the
        # loop, so it must reproduce exactly. A derived file that has stopped
        # reproducing is a fossil and every number built on it is quietly wrong.
        #
        # NOT checked here: data/ingredients.json. It is a 90-day window off
        # date.today(), so it changes with the calendar and cannot be diffed
        # against a committed copy -- the first version of this step did exactly
        # that and was a time bomb: green today, red on whatever Tuesday an
        # invoice crossed the 90-day line, with no code change. It is now
        # generated at build time and not committed at all.
        run: |
          set -e
          cp data/costs.csv /tmp/costs.before.csv
          python3 modules/recipes/pipeline/build_costs.py >/dev/null
          if ! diff -q /tmp/costs.before.csv data/costs.csv >/dev/null; then
            echo "::error::data/costs.csv is stale — rerun modules/recipes/pipeline/build_costs.py and commit"
            diff /tmp/costs.before.csv data/costs.csv | head -20
            exit 1
          fi
          echo "costs.csv reproduces from source"

      - name: Site must build and every reference must resolve
        # The repo layout and the deployed layout differ. A broken path fails
        # no test and no deploy — it shows up as a chef saying "the page is
        # blank". build_site.py resolves every href/src/import/fetch.
        run: python3 scripts/build_site.py

      - name: Guard rails still guard
        # Cheap, blunt, and aimed at the exact bugs that actually shipped this
        # week. If someone reintroduces max() in the cost guard, fail loudly
        # rather than wait for a wrong cost to reach a dish.
        run: |
          set -e
          if grep -rn "max(DRIFT_ABS\|max(SUSPECT_ABS" core/ modules/ scripts/ ; then
            echo "::error::cost guard is using max() (OR). It must be AND — see modules/invoices/resolve.py"
            exit 1
          fi
          python3 - <<'PY'
          import sys; sys.path.insert(0,'.')
          from decimal import Decimal
          from modules.invoices.resolve import is_suspect
          assert is_suspect(Decimal("212.44"), Decimal("184.94")), "Alehouse swap must be caught"
          assert not is_suspect(Decimal("1.47"), Decimal("1.8896")), "Sprite drift must pass"
          print("guards OK")
          PY
