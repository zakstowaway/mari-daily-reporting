name: Ingest Insights Email

# Free, always-on replacement for the Pipedream sales-email flow. The three
# Lightspeed "Daily Sales Auto" emails are routed to a dedicated Gmail; this polls
# it over IMAP and fires the same repository_dispatch events the daily pull
# consumes. Poll model self-heals: a late email is caught next run; re-runs are
# no-ops (only UNSEEN mail is processed, then marked \Seen).
#
# Why Gmail not M365: this tenant blocks every self-serve Graph path (app reg is
# admin-only, user consent disabled, Office client not preauthorised). Gmail +
# an app password needs no admin. See WORKING_HERE.md "Sales email ingestion".
# Secrets: GMAIL_ADDRESS, GMAIL_APP_PASSWORD, GH_DISPATCH_PAT.

on:
  schedule:
    # AEST = UTC+10. Cover ~05:00-11:59 AEST every 20 min (the 05:00/05:30/06:00
    # auto-exports land then), so a miss is picked up minutes later.
    - cron: '*/20 19-23 * * *'   # 05:00-09:59 AEST
    - cron: '*/20 0-1 * * *'     # 10:00-11:59 AEST
  workflow_dispatch:

concurrency:
  group: ingest-insights-email
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Read Gmail + dispatch
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_DISPATCH_PAT: ${{ secrets.GH_DISPATCH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: python3 scripts/ingest_insights_email.py
