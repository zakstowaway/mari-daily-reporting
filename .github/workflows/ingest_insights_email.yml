name: Ingest Insights Email

# Free, always-on replacement for the Pipedream sales-email flow. The three
# Lightspeed "Daily Sales Auto" emails are routed to a Gmail; this polls it over
# IMAP and fires the same repository_dispatch events the daily pull consumes.
# Self-healing: a late email is caught next run; re-runs are no-ops (dedupe on
# message-id ledger .ingest/processed.json). BODY.PEEK => the human inbox's
# read/unread state is never touched.
#
# Why Gmail not M365: this tenant blocks every self-serve Graph path (app reg
# admin-only, user consent disabled, Office client not preauthorised). Gmail + an
# app password needs no admin. See WORKING_HERE.md "Sales email ingestion".
# Secrets: GMAIL_ADDRESS, GMAIL_APP_PASSWORD, GH_DISPATCH_PAT.

on:
  schedule:
    - cron: '*/20 19-23 * * *'   # 05:00-09:59 AEST
    - cron: '*/20 0-1 * * *'     # 10:00-11:59 AEST
  workflow_dispatch:

concurrency:
  group: ingest-insights-email
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Read Gmail + dispatch
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_DISPATCH_PAT: ${{ secrets.GH_DISPATCH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: python3 scripts/ingest_insights_email.py

      - name: Commit processed-id ledger
        if: always()
        run: |
          git config user.name "Insights Ingest"
          git config user.email "hello@stowawaybar.com"
          git add .ingest/processed.json 2>/dev/null || true
          git diff --quiet --staged || git commit -m "ingest ledger $(date -u +%FT%TZ)"
          for i in 1 2 3; do git pull --rebase origin main && git push && break || sleep $((i*5)); done
