name: Wage Audit
on:
  workflow_dispatch:
    inputs:
      from_date: { description: 'From', required: true }
      to_date:   { description: 'To',   required: true }
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Audit
        env:
          DEPUTY_TOKEN: ${{ secrets.DEPUTY_TOKEN }}
        run: python scripts/rebuild_wages.py "${{ inputs.from_date }}" "${{ inputs.to_date }}" --audit
