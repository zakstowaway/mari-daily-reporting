name: Daily Pull

# PER-VENUE concurrency: a single shared queue only holds ONE pending run,
# so three simultaneous venue dispatches cancelled the middle one (stow,
# 2026-07-15 morning) and its payload was lost. Each venue now queues
# independently; cross-venue push collisions are absorbed by the
# pull-rebase-retry loops in the commit steps.
concurrency:
  group: daily-pull-${{ github.event.client_payload.venue || inputs.venue || github.event.action || 'cron' }}
  cancel-in-progress: false

on:
  # 6am Sydney fallback for missed dispatches
  schedule:
    - cron: '0 20 * * *'   # 6am AEST (winter)
    - cron: '0 19 * * *'   # 6am AEDT (summer)
    # Midday re-aggregation: the 6am pull races Deputy timesheet approval,
    # so hourly wages are understated first thing. This re-pulls yesterday
    # for all venues once approvals are in.
    - cron: '10 2 * * *'   # 12:10pm AEST / 1:10pm AEDT

  # Fired by Pipedream when a venue's Insights email arrives
  repository_dispatch:
    types:
      - insights-csv-arrived     # marilynas Sales by Product (legacy name kept for back-compat)
      - stow-csv-arrived         # stowaway Sales by Product
      - hg-csv-arrived           # harry gatos Sales by Product
      - mari-payments-arrived    # marilynas Sales by Payment Type
      - stow-payments-arrived    # stowaway Sales by Payment Type
      - hg-payments-arrived      # harry gatos Sales by Payment Type

  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD), defaults to yesterday'
        required: false
        default: ''
      venue:
        description: 'Venue key (marilynas, stowaway, harry)'
        required: false
        default: 'marilynas'

jobs:
  pull-and-aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine venue + payload kind
        id: venue
        run: |
          EVENT="${{ github.event.action }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            V="${{ inputs.venue }}"
          elif [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            V="${{ github.event.client_payload.venue }}"
            # legacy fallback: old dispatches don't set venue
            if [[ -z "$V" ]]; then
              case "$EVENT" in
                stow-*) V=stowaway ;;
                hg-*)   V=harry ;;
                *)      V=marilynas ;;
              esac
            fi
          else
            V="marilynas"   # single-venue default; cron loops all venues below
          fi
          echo "venue=$V" >> $GITHUB_OUTPUT
          # Payload kind: payments events carry a Sales-by-Payment-Type CSV
          if [[ "$EVENT" == *"payments"* ]]; then
            KIND=payments
          else
            KIND=insights
          fi
          echo "kind=$KIND" >> $GITHUB_OUTPUT
          # Map venue -> file prefix (matches scripts/venues.py)
          case "$V" in
            marilynas) PREFIX=mari ;;
            stowaway)  PREFIX=stow ;;
            harry)     PREFIX=hg   ;;
            *) echo "::error::unknown venue $V"; exit 1 ;;
          esac
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "Venue: $V (prefix: $PREFIX, kind: $KIND)"

      - name: Determine target date
        id: date
        run: |
          if [[ -n "${{ inputs.target_date }}" ]]; then
            echo "target=${{ inputs.target_date }}" >> $GITHUB_OUTPUT
          else
            echo "target=$(TZ='Australia/Sydney' date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Ingest CSV from event payload
        if: github.event_name == 'repository_dispatch'
        run: |
          TARGET_DATE="${{ steps.date.outputs.target }}"
          PREFIX="${{ steps.venue.outputs.prefix }}"
          KIND="${{ steps.venue.outputs.kind }}"
          TMP_BIN="/tmp/insights_payload.bin"
          if [[ "$KIND" == "payments" ]]; then
            FINAL_CSV="data/payments_${PREFIX}_${TARGET_DATE}.csv"
          else
            FINAL_CSV="data/insights_${PREFIX}_${TARGET_DATE}.csv"
          fi
          mkdir -p data /tmp/insights_unzip

          echo '${{ toJson(github.event.client_payload.csv_base64) }}' | tr -d '"' | base64 -d > "$TMP_BIN"
          FILE_TYPE=$(file --mime-type -b "$TMP_BIN")
          echo "Detected: $FILE_TYPE"

          if [[ "$FILE_TYPE" == "application/zip" ]]; then
            unzip -o "$TMP_BIN" -d /tmp/insights_unzip
            LARGEST_CSV=$(find /tmp/insights_unzip -name '*.csv' -printf '%s %p\n' | sort -rn | head -1 | awk '{print $2}')
            [[ -z "$LARGEST_CSV" ]] && { echo "::error::ZIP has no CSV"; exit 1; }
            mv "$LARGEST_CSV" "$FINAL_CSV"
          else
            mv "$TMP_BIN" "$FINAL_CSV"
          fi
          # For marilynas sales CSV, also drop the legacy unprefixed file for aggregator's fallback
          if [[ "$PREFIX" == "mari" && "$KIND" == "insights" ]]; then cp "$FINAL_CSV" "data/insights_${TARGET_DATE}.csv"; fi
          echo "Wrote $FINAL_CSV"

      - name: Preserve CSV payload immediately
        if: github.event_name == 'repository_dispatch'
        run: |
          git config user.name "Daily Pull"
          git config user.email "hello@stowawaybar.com"
          git add data/
          git diff --quiet --staged || git commit -m "Ingest payload ${{ steps.venue.outputs.venue }} ${{ steps.date.outputs.target }}"
          for i in 1 2 3; do git pull --rebase origin main && git push && break || sleep $((i*5)); done

      - name: Deputy pull + aggregate
        env:
          DEPUTY_TOKEN: ${{ secrets.DEPUTY_TOKEN }}
        run: |
          # Cron fans out over every venue (covers missed dispatches for all
          # three); dispatch/manual runs stay single-venue. Aggregation is
          # idempotent - re-running a venue with unchanged inputs rewrites
          # the same record.
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            VENUES="marilynas stowaway harry"
          else
            V="${{ steps.venue.outputs.venue }}"
            T="${{ steps.date.outputs.target }}"
            VENUES="$V"
            # Stow & HG share a till — HG food rings through the Stow POS. The two
            # Insights payloads land up to ~30 min apart, so whichever aggregates
            # first misses the sibling's cross-till rows (2026-07-20: HG lost
            # $1,205 that was stripped off Stow but never added to HG). Fix: when
            # one lands, ALSO re-aggregate the sibling — but only if the sibling's
            # raw CSV is already committed, so the later payload repairs the
            # earlier one and we never blank a venue that hasn't landed yet.
            if [[ "$V" == "stowaway" && -f "data/insights_hg_${T}.csv" ]];   then VENUES="stowaway harry"; fi
            if [[ "$V" == "harry"    && -f "data/insights_stow_${T}.csv" ]]; then VENUES="harry stowaway"; fi
          fi
          for V in $VENUES; do
            echo "=== $V ==="
            python scripts/daily_deputy_pull.py --venue "$V" ${{ steps.date.outputs.target }}
            python scripts/daily_aggregator.py --venue "$V" ${{ steps.date.outputs.target }}
          done

      - name: Rebuild product-level weekly rollup
        run: |
          # Menu Trends "Products" view. Reads the committed Sales-by-Product
          # exports, reattributes cross-till rows, joins the reporting-group name.
          python scripts/build_products_weekly.py || echo "::warning::products rollup failed (non-fatal)"

      - name: Rebuild product Sales API (dashboard/sales/products/*.json)
        run: |
          # Path B: JSON endpoints for cross-surface Claude access — served from
          # app.stowawaybar.com/sales/products/. Read by any Claude chat via
          # web_fetch (see dashboard/sales/products/SCHEMA.md). Depends on
          # data/products_weekly.csv from the previous step.
          python scripts/build_products_api.py || echo "::warning::products API build failed (non-fatal)"

      - name: Commit updated data
        run: |
          git config user.name "Daily Pull"
          git config user.email "hello@stowawaybar.com"
          git add data/ dashboard/sales/products/
          git diff --quiet --staged || git commit -m "Daily pull ${{ steps.venue.outputs.venue }} ${{ steps.date.outputs.target }}"
          for i in 1 2 3; do git pull --rebase origin main && git push && break || sleep $((i*5)); done
