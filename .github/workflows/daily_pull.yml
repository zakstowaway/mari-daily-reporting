name: Mari Daily Pull

on:
  # Fire at 6am Sydney time daily (UTC = 20:00 previous day for AEST winter, 19:00 for AEDT summer)
  # We schedule TWICE (both are conservative — running at both times ensures 6am regardless of DST)
  schedule:
    - cron: '0 20 * * *'   # 6am AEST (winter, UTC+10)
    - cron: '0 19 * * *'   # 6am AEDT (summer, UTC+11)

  # Triggered by Zapier when Insights email arrives
  repository_dispatch:
    types: [insights-csv-arrived]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD), defaults to yesterday'
        required: false
        default: ''

jobs:
  pull-and-aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine target date
        id: date
        run: |
          if [[ -n "${{ inputs.target_date }}" ]]; then
            echo "target=${{ inputs.target_date }}" >> $GITHUB_OUTPUT
          else
            # Sydney date (yesterday)
            echo "target=$(TZ='Australia/Sydney' date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
          echo "Target date: $(cat $GITHUB_OUTPUT | grep target)"

      - name: Ingest Insights CSV from event payload
        if: github.event_name == 'repository_dispatch'
        run: |
          # Zapier POSTs the base64 CSV content in the dispatch payload
          echo '${{ toJson(github.event.client_payload.csv_base64) }}' | tr -d '"' | base64 -d > data/insights_${{ steps.date.outputs.target }}.csv
          echo "Insights CSV received via dispatch"

      - name: Deputy pull
        env:
          DEPUTY_TOKEN: ${{ secrets.DEPUTY_TOKEN }}
        run: |
          python scripts/daily_deputy_pull.py ${{ steps.date.outputs.target }}

      - name: Aggregate
        run: |
          python scripts/daily_aggregator.py ${{ steps.date.outputs.target }}

      - name: Commit updated data
        run: |
          git config user.name "Mari Daily Pull"
          git config user.email "hello@stowawaybar.com"
          git add data/
          git diff --quiet --staged || git commit -m "Daily pull ${{ steps.date.outputs.target }}"
          git push

      - name: Failure notification (any step)
        if: failure()
        # Zapier catches this via webhook. Cheapest cross-platform notification.
        run: |
          curl -X POST "${{ secrets.FAILURE_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"date":"${{ steps.date.outputs.target }}","status":"failed","workflow":"mari-daily"}' \
            || echo "Notification failed too — check GitHub Actions history"
