name: Deploy dashboard to GitHub Pages

on:
  workflow_run:
    workflows: ["Daily Pull", "Mari Daily Pull", "Wages Backfill", "Roster Pull"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        # build_site.py now generates the recipe feeds, which import the cost
        # engine (PyYAML). Without this the build fails with ModuleNotFoundError
        # even though it works locally. Same deps as the test job.
        run: pip install -r requirements.txt
      - name: Build _site
        # ONE definition of the site layout, shared with local preview:
        #   python3 scripts/build_site.py --serve
        # If it works locally it works here, because it is the same code.
        # Also fails the deploy if any page references a file that isn't built.
        run: python3 scripts/build_site.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
