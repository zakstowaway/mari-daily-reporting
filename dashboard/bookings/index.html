<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bookings · Stowaway Hospitality Group</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/_shared/tokens.css?v=20260719b">
<!--
  Bookings admin — a tool page behind the shared Supabase gate, same as
  /sales/ and /recipes/. The page is a shell: ALL logic lives in bookings.js
  (arch_guard discipline). It talks live to the booking engine service
  (seating-solver-backed), which holds its own real auth: a bearer token,
  entered once per device and kept in localStorage. The Supabase gate decides
  who may see this page; the token decides what the service will accept.

  Bump the ?v= on bookings.js whenever it changes — same convention as
  tokens.css. A stale cached module against fresh HTML is a blank page.
-->
<style>
  .wrap{max-width:1100px;margin:0 auto;padding:24px}
  .app-header{border-bottom:1px solid var(--line);background:var(--paper)}
  .app-header-inner{max-width:1100px;margin:0 auto;padding:14px 24px;display:flex;
    align-items:center;justify-content:space-between;gap:16px}
  .brand-row{display:flex;align-items:center;gap:11px;text-decoration:none;color:inherit}
  .brand-row img{height:34px;width:auto;display:block}
  .group-brand{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--ink)}
  .app-header .who{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft)}
  .app-header .who a{color:var(--ink);text-decoration:none}
  h1{font-family:'Space Grotesk',sans-serif;font-size:24px;margin:0 0 4px}
  .sub{color:var(--ink-soft);font-size:13.5px;margin-bottom:18px}
  .bar{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:16px}
  label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;
        color:var(--ink-soft);margin-bottom:3px;letter-spacing:.05em}
  input,select{padding:8px;border:1px solid var(--line);border-radius:8px;font-size:14px;
        background:var(--paper);color:var(--ink)}
  button{padding:9px 14px;border:none;border-radius:8px;background:var(--ink);
         color:var(--paper);font-size:13px;cursor:pointer;font-weight:600}
  button.warn{background:var(--red,#b3403f)}
  button.ghost{background:var(--paper);color:var(--ink);border:1px solid var(--line)}
  .pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;
        font-weight:600;background:var(--line);color:var(--ink);white-space:nowrap}
  .pill.dog{background:#f5d8c8;color:#1a1a1a}.pill.kid{background:#fff3a8;color:#1a1a1a}
  .yes{color:var(--green,#2e7d4f);font-weight:600}.no{color:var(--red,#b3403f);font-weight:600}
  .sitting-block{background:var(--paper);border:1px solid var(--line);border-radius:14px;
        margin-bottom:18px;overflow:hidden;box-shadow:var(--shadow)}
  .sitting-head{display:flex;gap:14px;align-items:baseline;padding:13px 18px;
        border-bottom:1px solid var(--line)}
  .sit-time{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700}
  .sit-meta{color:var(--ink-soft);font-size:13px}
  .sit-fit{margin-left:auto;font-size:12.5px}
  .brow{display:flex;align-items:center;gap:14px;padding:11px 18px;
        border-bottom:1px solid var(--line)}
  .brow:last-child{border-bottom:none}
  .brow.pending{border-left:3px solid var(--amber,#b8860b)}
  .btable{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13.5px;
        min-width:104px;background:transparent;color:var(--ink);border-radius:8px;
        border:1.5px solid var(--ink-soft);text-align:center;padding:8px 6px;
        white-space:nowrap;letter-spacing:.03em}
  .bmain{flex:1;min-width:0}
  .bname{font-weight:600;font-size:15px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .bsub{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .bnote{color:var(--amber,#c9973b);font-style:italic}
  .bpax{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;
        min-width:52px;text-align:right}
  .bpax small{font-size:10px;color:var(--ink-soft);margin-left:2px;font-weight:400}
  .bacts{display:flex;gap:6px}
  .mini{padding:5px 11px;font-size:11.5px;border-radius:6px;background:transparent;
        color:var(--ink-soft);border:1px solid var(--line);font-weight:600;cursor:pointer}
  .mini:hover{color:var(--ink);border-color:var(--ink)}
  .mini.danger:hover{color:#fff;background:var(--red,#b3403f);border-color:var(--red,#b3403f)}
  .cancelled-list{margin:4px 0 20px;color:var(--ink-soft);font-size:13px}
  .cancelled-list summary{cursor:pointer;font-weight:600;padding:6px 2px}
  .crow{padding:4px 14px;text-decoration:line-through;opacity:.6}
  #status{margin-left:auto;font-size:13px;color:var(--ink-soft)}
  .section{margin-top:22px}
  h2{font-family:'Space Grotesk',sans-serif;font-size:15px;margin-bottom:8px}
  #tokenbox{background:var(--paper);border:1px solid var(--line);border-radius:12px;
        padding:18px;max-width:520px;box-shadow:var(--shadow)}
  .events{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .event-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;
        padding:14px 18px;cursor:pointer;box-shadow:var(--shadow);min-width:220px;
        border-top:4px solid var(--grey);transition:transform .12s}
  .event-card:hover{transform:translateY(-2px)}
  .event-card.sel{border-top-color:var(--stow);outline:2px solid var(--ink)}
  .event-card h3{font-family:'Space Grotesk',sans-serif;font-size:15px;margin:0 0 4px}
  .event-card .when{font-size:12.5px;color:var(--ink-soft)}
</style>
</head>
<body>
<div id="gate"></div>
<div id="app" style="display:none">
  <header class="app-header"><div class="app-header-inner">
    <a class="brand-row" href="/"><img src="/logo_512.png" alt=""><span class="group-brand">Stowaway Hospitality Group</span></a>
    <div class="who"><span id="whotop"></span><a href="/">home</a><a href="#" id="signout">sign out</a></div>
  </div></header>

  <div class="wrap">
    <h1>Bookings</h1>
    <div class="sub" id="eventline">Loading the live event…</div>

    <div id="tokenbox" style="display:none">
      <h2>Connect to the booking engine</h2>
      <p style="font-size:13px;color:var(--ink-soft);margin:6px 0 12px">
        One-time on this device: paste the booking service token
        (Render → stowaway-bookings → Environment → STOWAWAY_ADMIN_TOKEN).</p>
      <div class="bar">
        <div style="flex:1"><label>Service token</label>
          <input id="svc_token" type="password" style="width:100%"></div>
        <button id="savetoken">Connect</button>
      </div>
    </div>

    <div id="main" style="display:none">
      <div class="events" id="events"></div>
      <div class="bar">
        <button class="ghost" id="runsheetbtn">Runsheet PDF</button>
        <span id="status"></span>
      </div>
      <div id="daywrap"></div>

      <div class="section" id="editbox" style="display:none">
        <h2>Edit booking <span id="edit_name" style="font-weight:normal"></span></h2>
        <div class="bar">
          <div><label>Sitting</label><select id="ed_time"></select></div>
          <div><label>Adults</label><input id="ed_adults" type="number" min="1" max="12" style="width:70px"></div>
          <div><label>Kids</label><input id="ed_kids" type="number" min="0" max="8" style="width:70px"></div>
          <div><label>Babies</label><input id="ed_babies" type="number" min="0" max="4" style="width:70px"></div>
          <div><label>Dogs</label><input id="ed_dogs" type="number" min="0" max="3" style="width:70px"></div>
          <div><label>Phone</label><input id="ed_phone"></div>
          <div style="flex:1"><label>Notes</label><input id="ed_notes" style="width:100%"></div>
          <button id="saveeditbtn">Save changes</button>
          <button class="ghost" id="closeeditbtn">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="./bookings.js?v=20260723e"></script>
</body>
</html>
