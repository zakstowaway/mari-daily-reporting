<!doctype html><html><head><meta charset=utf-8><title>EatClub — Harry Gatos</title>
<style>
body{font-family:-apple-system,Helvetica,Arial;margin:32px;color:#16181d;background:#fff}
h1{margin-bottom:2px;font-size:26px} h2{font-size:15px;text-transform:uppercase;letter-spacing:.06em;color:#666;margin:34px 0 10px}
.sub{color:#777;margin-bottom:24px;font-size:14px}
.cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.card{border:1px solid #e6e6e6;border-radius:10px;padding:13px 17px;min-width:118px}
.card .v{font-size:21px;font-weight:600} .card .l{font-size:11px;color:#777;text-transform:uppercase;letter-spacing:.04em}
table{border-collapse:collapse;width:100%}
th,td{border-bottom:1px solid #eee;padding:9px 10px;text-align:right;font-size:14px;vertical-align:top}
th:first-child,td:first-child,th:last-child,td:last-child{text-align:left}
th{background:#fafafa;font-size:11px;text-transform:uppercase;color:#666;letter-spacing:.04em}
.pos{color:#12794a;font-weight:600} .neg{color:#b23b3b;font-weight:600}
.mutetxt{color:#999;font-size:12px} .whytxt{color:#777;font-size:12px;margin-top:3px;max-width:330px;line-height:1.35}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em}
.pill.good{background:#e4f5eb;color:#12794a} .pill.warn{background:#fff2e0;color:#9a5b12} .pill.mute{background:#f0f0f0;color:#777}
.flag{background:#fff8ea;border-left:4px solid #e8a33d;padding:13px 16px;border-radius:6px;margin-top:14px;font-size:14px;line-height:1.5}
.flag.red{background:#fdefef;border-left-color:#c9524f}
.big{font-size:16px;font-weight:700;color:#12794a}
tr.tot td{border-top:2px solid #333;background:#fafafa;font-weight:700}

@media (prefers-color-scheme: dark) {
  body{color:#f2f0ea;background:#161512}
  h2,.sub,.card .l,.mutetxt,.whytxt{color:#a7a29a}
  .card{border-color:#3a382f}
  th{background:#1f1e19;color:#a7a29a}
  th,td{border-bottom-color:#2c2a24}
  .pos{color:#5dcaa5} .neg{color:#f09595}
  .pill.good{background:#0a3d2c;color:#9fe1cb}
  .pill.warn{background:#43300b;color:#fac775}
  .pill.mute{background:#2c2c2a;color:#b4b2a9}
  .flag{background:#332a12;border-left-color:#e8a33d}
  .flag.red{background:#3b1a1a;border-left-color:#c9524f}
  tr.tot td{background:#1f1e19;border-top-color:#a7a29a}
  a{color:#85b7eb}
}
</style></head><body>
<script>document.documentElement.style.visibility = 'hidden';</script>
<div style="margin-bottom:14px"><a href="/" style="font-size:14px;color:#666;text-decoration:none">&larr; Back to dashboard</a></div>
<h1>EatClub — Harry Gatos</h1>
<div class=sub id=sub>Loading…</div>
<div id=app></div>

<script type="module">
  // Open to ALL signed-in users; live data from /data/eatclub_nights.json (rebuilt
  // each daily pull), so the page stays current instead of being a static snapshot.
  import { Auth } from '/_shared/auth.js';
  let me = null;
  try { me = await Auth.current(); } catch (e) { console.error('auth', e); }
  if (!me) { location.replace('/'); }
  else { document.documentElement.style.visibility = ''; render(); }

  const $ = n => (n < 0 ? '−$' : '$') + Math.round(Math.abs(n)).toLocaleString();
  const $2 = n => '$' + n.toFixed(2);
  const pc = n => n.toFixed(1) + '%';
  const exgst = n => n / 1.1;
  const dfmt = iso => new Date(iso + 'T00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
  const dow = iso => new Date(iso + 'T00:00').toLocaleDateString('en-AU', { weekday: 'short' });
  const weekEnding = iso => { const d = new Date(iso + 'T00:00'); const off = (7 - d.getDay()) % 7; d.setDate(d.getDate() + off); return d.toISOString().slice(0, 10); };

  async function render() {
    const app = document.getElementById('app');
    let d;
    try { d = await (await fetch('/data/eatclub_nights.json?t=' + Date.now())).json(); }
    catch (e) { document.getElementById('sub').textContent = 'Could not load EatClub data.'; return; }
    const N = d.nights, cogs = d.cogs_pct;
    document.getElementById('sub').textContent =
      `Launched ${dfmt(d.launch)} 2026 · ${N.length} nights · latest ${dfmt(d.latest)} 2026 · live`;
    const sum = f => N.reduce((t, n) => t + f(n), 0);
    const tables = sum(n => n.tables), covers = sum(n => n.covers);
    const menuInc = sum(n => n.menu_inc), netInc = sum(n => n.net_inc), give = sum(n => n.giveaway_inc);
    const costPct = menuInc ? give / menuInc * 100 : 0;

    // cards
    let html = `<div class=cards>
      <div class=card><div class=l>Redeemed tables</div><div class=v>${tables}</div></div>
      <div class=card><div class=l>Covers</div><div class=v>${covers}</div></div>
      <div class=card><div class=l>Full menu value</div><div class=v>${$(menuInc)}</div></div>
      <div class=card><div class=l>Net to HG</div><div class=v>${$(netInc)}</div></div>
      <div class=card><div class=l>Channel cost</div><div class=v>${$(give)}</div><div class=l>${pc(costPct)} of bill</div></div>
      <div class=card><div class=l>Avg / cover (net)</div><div class=v>${covers ? $2(netInc / covers) : '—'}</div></div>
    </div>`;

    // weekly contribution (ex-GST), Sunday weeks
    const wk = {};
    for (const n of N) { const w = weekEnding(n.date); (wk[w] = wk[w] || []).push(n); }
    let tM = 0, tD = 0, tC = 0, tNet = 0, tCog = 0, tCov = 0;
    let rowsHtml = '';
    for (const w of Object.keys(wk).sort()) {
      const ns = wk[w];
      const m = exgst(ns.reduce((t, n) => t + n.menu_inc, 0));
      const dis = exgst(ns.reduce((t, n) => t + n.discount_inc, 0));
      const com = exgst(ns.reduce((t, n) => t + n.commission_inc, 0));
      const net = exgst(ns.reduce((t, n) => t + n.net_inc, 0));
      const cov = ns.reduce((t, n) => t + n.covers, 0);
      const cog = m * cogs / 100, contr = net - cog;
      tM += m; tD += dis; tC += com; tNet += net; tCog += cog; tCov += cov;
      rowsHtml += `<tr><td>w/e ${dfmt(w)}<br><span class=mutetxt>${ns.length} nights · ${ns.reduce((t, n) => t + n.tables, 0)} tables · ${cov} covers</span></td>` +
        `<td>${$(m)}</td><td class=neg>−${$(dis)}</td><td class=neg>−${$(com)}</td><td>${$(net)}</td>` +
        `<td class=neg>−${$(cog)}</td><td class=big>${$(contr)}</td><td>${net ? pc(contr / net * 100) : '—'}</td><td>${cov ? $2(contr / cov) : '—'}</td></tr>`;
    }
    const tContr = tNet - tCog;
    html += `<h2>Weekly contribution — net of EatClub discount, commission &amp; actual COGS (ex-GST)</h2>
      <table><tr><th>Week</th><th>Menu value</th><th>Discount</th><th>Commission</th><th>Net revenue</th><th>COGS @ ${cogs}% actual</th><th>Contribution</th><th>% of net</th><th>Per cover</th></tr>
      ${rowsHtml}
      <tr class=tot><td>Program to date</td><td>${$(tM)}</td><td class=neg>−${$(tD)}</td><td class=neg>−${$(tC)}</td><td>${$(tNet)}</td><td class=neg>−${$(tCog)}</td><td class=big>${$(tContr)}</td><td>${tNet ? pc(tContr / tNet * 100) : '—'}</td><td>${tCov ? $2(tContr / tCov) : '—'}</td></tr></table>
      <div class=flag><b>COGS ${cogs}%</b> charged on the <b>full</b> menu volume (the kitchen cooks the whole dish; the discount comes off the price, not the plate). Commission is 10% ex-GST (the 11% billed includes GST, which you reclaim). <b>Labour is excluded.</b></div>`;

    // nightly redemptions (newest first)
    let nightRows = '';
    for (const n of [...N].reverse()) {
      const cp = n.menu_inc ? n.giveaway_inc / n.menu_inc * 100 : 0;
      nightRows += `<tr><td>${n.date}<br><span class=mutetxt>${dow(n.date)}</span></td><td>${n.tables}</td><td>${n.covers}</td>` +
        `<td>${$2(n.menu_inc)}</td><td>${$2(n.net_inc)}</td><td>${$2(n.giveaway_inc)}</td><td>${pc(cp)}</td>` +
        `<td>${n.covers ? $2(n.menu_inc / n.covers) : '—'}</td><td>${n.covers ? $2(n.net_inc / n.covers) : '—'}</td></tr>`;
    }
    html += `<h2>Nightly redemptions</h2>
      <table><tr><th>Night</th><th>Tables</th><th>Covers</th><th>Full bill</th><th>Net</th><th>Channel cost</th><th>Cost %</th><th>SPH full</th><th>SPH net</th></tr>${nightRows}</table>
      <p style="text-align:center;font-size:12px;opacity:.55;margin:24px 0;">Live · rebuilt each daily pull from EatClub nightly data. Deeper cannibalisation / drink-attach analysis is refreshed with the Monday weekly pull.</p>`;

    app.innerHTML = html;
  }
</script>
</body></html>
