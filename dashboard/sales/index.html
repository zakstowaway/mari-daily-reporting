    let sub = `${w.a ? 'actual' : 'est.'} COGS ${fmtPct(w.cogsPct)} \u00b7 OH ${fmtDollars(w.oh)}` +
           (w.df ? ` \u00b7 delivery ${fmtDollars(w.df)}` : '') +
           (w.cp ? ` \u00b7 corp payroll ${fmtDollars(w.cp)}` : '') +
           (w.fin ? ` \u00b7 interest & dep ${fmtDollars(w.fin)}` : '') +
           ` \u00b7 ${fmtPct(w.profit / w.rev * 100)} net margin`;
    const bp = breakevenParts(STATE.currentVenue, winEnd(day));
    if (bp) {
      const be = bp.fixedDaily * ohFactor(day, STATE.currentVenue, w.wdays) / (1 - bp.varPct / 100);
      sub += ` \u00b7 breakeven ${fmtDollars(be)}`;
    }
    if (w.partial) sub += ` \u00b7 ${w.wdays} of ${w.daysAll} days costed`;
    return {
      label: 'Expected profit ' + pill('open period', 'warn'),
      value: (w.profit < 0 ? '\u2212$' : '$') + Math.round(Math.abs(w.profit)).toLocaleString(),
      sub,
      status: w.profit >= 0 ? 'green' : 'red',
    };
  },
  revenue: (day, cfg) => {
    let sub = day.days_included ? `${day.days_included} days` : day.contributing_venues ? `${day.contributing_venues} of 3 venues` : day.date;
    if (CURRENT_ROLE === 'admin') {
      const rows = STATE.histories[STATE.currentVenue] || [];
      let anchorDay = STATE.currentDay;
      if (!anchorDay && rows.length) anchorDay = rows[rows.length - 1].date;
      const d = yoyRevenueDelta(rows, STATE.currentTimeframe, anchorDay);
      if (d !== null) sub += ' \u00b7 ' + pill((d >= 0 ? '+' : '\u2212') + Math.abs(d).toFixed(1) + '% vs same period last year', d >= 0 ? 'green' : 'red');
      // Pacing: project the current period to its end via DOW medians.
      const pb = periodBounds(STATE.currentTimeframe, anchorDay);
      if (pb) {
        const cur = rows.filter(r => r.date >= pb.s && r.date <= pb.e);
        const lastData = cur.length ? cur[cur.length - 1].date : null;
        if (lastData && lastData < pb.e) {
          let proj = cur.reduce((t2, r) => t2 + toNum(r.revenue_ex_gst), 0);
          for (let dd = addDays(new Date(lastData), 1); isoDate(dd) <= pb.e; dd = addDays(dd, 1)) {
            proj += venueForecast(STATE.currentVenue, dd.getDay());
          }
          const lyS = isoDate(addDays(new Date(pb.s), -364)), lyE = isoDate(addDays(new Date(pb.e), -364));
          const ly = rows.filter(r => r.date >= lyS && r.date <= lyE).reduce((t2, r) => t2 + toNum(r.revenue_ex_gst), 0);
          let txt = 'on pace for ' + fmtDollars(proj);
          if (ly) { const dp = (proj - ly) / ly * 100; txt += ` (${dp >= 0 ? '+' : '\u2212'}${Math.abs(dp).toFixed(1)}% vs LY)`; }
          sub += ' \u00b7 ' + pill(txt, ly ? (proj >= ly ? 'green' : 'warn') : 'warn');
        }
      }
    }
    return { label: 'Revenue (gross)', value: fmtDollars(grossRev(day)), sub, status: 'unknown' };
  },
  wages_hero: (day, cfg) => {
    const med = wageMedian12wk(STATE.histories[STATE.currentVenue] || []);
    let sub = cfg.show_dollar_amounts ? fmtDollars(toNum(day.wages_dollars)) : '';
    sub += STATE.currentVenue === 'mari' ? ' incl driver \u00b7 Deputy' : ' \u00b7 Deputy incl super';
    // If this day is standing on assumed shifts, say so ON the number. The whole
    // point is a usable figure by midday \u2014 but an estimate that doesn't announce
    // itself is how you end up trusting 14.7% for two days.
    const aN = toNum(day.wages_assumed_n);
    if (aN) {
      const act = toNum(day.wages_actual_dollars);
      sub += ' \u00b7 ' + pill(`assumed \u00b7 ${aN} shift${aN > 1 ? 's' : ''} not clocked`, 'warn');
      if (cfg.show_dollar_amounts && act) sub += `<span class="vs-t">clocked so far ${fmtDollars(act)}</span>`;
    }
    const tgt = wageTargetFor(day);
    let status = day.wages_alert;
    let vsOut = '';
    if (tgt !== null && hasVal(day.wages_pct)) {
      const pv = toNum(day.wages_pct);
      // the weekday matters: a Monday target isn't a Saturday target
      vsOut = vsTarget(pv, tgt) + `<span class="vs-t">${String(day.date || '').length === 10 ? new Date(day.date).toLocaleDateString('en-AU', { weekday: 'short' }) : 'wk'}</span>`;
      status = pv > tgt + 2 ? 'red' : pv < tgt - 2 ? 'green' : 'amber';
    }
    if (med !== null && hasVal(day.wages_pct)) {
      const d = toNum(day.wages_pct) - med;
      sub += ' \u00b7 ' + pill((d >= 0 ? '+' : '\u2212') + Math.abs(d).toFixed(1) + 'pp vs 12-wk median', d > 1 ? 'red' : d < -1 ? 'green' : 'warn');
    }
    return { label: 'Wages', value: hasVal(day.wages_pct) ? fmtPct(toNum(day.wages_pct)) : '\u2014', vs: vsOut, sub, status };
  },
  cogs_merged: (day, cfg) => {
    const a = actualCogs(STATE.currentVenue, winEnd(day));
    const est = hasVal(day.cogs_pct) ? toNum(day.cogs_pct) : null;
    if (!a) return { label: 'COGS', value: est !== null ? fmtPct(est) : '\u2014', sub: 'expected (Lightspeed) \u2014 no Xero purchases yet', status: day.cogs_alert };
    let chip = '';
    if (est !== null) {
      const d = a.pct - est;
      chip = ' ' + pill((d >= 0 ? '+' : '\u2212') + Math.abs(d).toFixed(1) + 'pp vs expected', d > 1.5 ? 'red' : 'green');
    }
    let sub2 = `actual, Xero 4-wk purchases \u00b7 expected ${est !== null ? fmtPct(est) : '\u2014'} (Lightspeed)`;
    const sp = actualCogsSplit(STATE.currentVenue, winEnd(day));
    if (sp && (sp.food !== null || sp.bev !== null)) {
      const bits = [];
      if (sp.food !== null) bits.push('food ' + fmtPct(sp.food));
      if (sp.bev !== null) bits.push('bev ' + fmtPct(sp.bev));
      sub2 += ' \u00b7 ' + bits.join(' / ') + ' actual';
    }
    sub2 += ` · tgt ${fmtPct(COGS_TARGET_PCT)}`;
    return { label: 'COGS', value: fmtPct(a.pct) + chip, sub: sub2, status: cogsStatus(a.pct) };
  },
  delivery_fees: (day, cfg) => {
    const rev = toNum(day.revenue_ex_gst);
    const fa = feesActualWindow(day);
    if (fa && rev) {
      const uberLbl = fa.portal ? 'Uber svc (portal, ex-mktg)' : 'Uber';
      const src = STATE.currentVenue === 'mari'
        ? `${uberLbl} + Uber Direct ${fmtDollars(fa.mari)}${fa.portal && fa.mkt ? ` \u00b7 Uber marketing ${fmtDollars(fa.mkt)} excluded` : ''}`
        : STATE.currentVenue === 'group'
        ? `${uberLbl}+Direct ${fmtDollars(fa.mari)} \u00b7 ME&U+Doshii ${fmtDollars(fa.meu)}`
        : 'ME&U + Doshii, revenue-share';
      return { label: 'Delivery platforms ' + pill('actual', 'green'), value: fmtPct(fa.fees / rev * 100),
        sub: `${fmtDollars(fa.fees)} actual${fa.portal ? ' (Uber portal + Xero)' : ', booked in Xero'}, ${fa.nMonths} complete month${fa.nMonths > 1 ? 's' : ''} \u00b7 ${src} \u00b7 driver in wages`, status: 'unknown' };
    }
    const dfr = deliveryFeesPct(STATE.currentVenue, winEnd(day));
    if (!dfr || !rev) return { label: 'Delivery platforms', value: '\u2014', sub: 'no Xero fee data', status: 'unknown' };
    const _win = String(day.date).includes(' — ') ? String(day.date).split(' — ') : [day.date, day.date];
    // Group: sum each venue's live actual-or-estimate when any Uber data covers
    // the window, so the card is current (not the blended trailing rate).
    if (STATE.currentVenue === 'group' && rev) {
      const parts = REAL_VENUES.map(v => venueDeliveryEst(v, _win[0], _win[1], winEnd(day)));
      if (parts.some(x => x.actual)) {
        const del = parts.reduce((t, x) => t + x.df, 0);
        const comm = parts.reduce((t, x) => t + x.commission, 0);
        const mktG = parts.reduce((t, x) => t + x.marketing, 0);
        const direct = parts.reduce((t, x) => t + (x.direct || 0), 0);
        const dirT = parts.some(x => x.direct !== null) ? ` · Uber Direct ${fmtDollars(direct)}` : '';
        const mktT = mktG > 0 ? ` · marketing ${fmtDollars(mktG)} (offers+ads)` : '';
        return { label: 'Delivery platforms ' + pill('Uber actual', 'green'), value: fmtPct(del / rev * 100),
          sub: `${fmtDollars(del)} · Uber commission ${fmtDollars(comm)}${dirT}${mktT} + ME&U est · driver in wages`, status: 'unknown' };
      }
    }
    const p = STATE.currentVenue === 'group' ? null : venueDeliveryEst(STATE.currentVenue, _win[0], _win[1], winEnd(day));
    if (p && p.actual) {
      const other = STATE.currentVenue === 'mari'
        ? (p.direct !== null ? ` · Uber Direct ${fmtDollars(p.direct)}` : ' + Uber Direct est')
        : ' + ME&U est';
      const mkt = p.marketing > 0 ? ` · marketing ${fmtDollars(p.marketing)} (offers+ads)` : '';
      const lbl = STATE.currentVenue === 'mari' && p.direct !== null ? 'Uber+Direct actual' : 'Uber actual';
      return { label: 'Delivery platforms ' + pill(lbl, 'green'), value: fmtPct(p.df / rev * 100),
        sub: `${fmtDollars(p.df)} · Uber commission ${fmtDollars(p.commission)}${mkt}${other}`, status: 'unknown' };
    }
    const src = STATE.currentVenue === 'mari' ? 'Uber Eats + Direct' : STATE.currentVenue === 'group' ? 'all platforms' : 'ME&U share';
    return { label: 'Delivery platforms', value: fmtPct(dfr.pct),
      sub: `est. ${fmtDollars(rev * dfr.pct / 100)} ${src} fees (Xero trailing ${dfr.months}-mo rate) \u00b7 driver in wages`, status: 'unknown' };
  },
  eatclub: (day, cfg) => {
    // EatClub rings the FULL bill on the POS, then keeps the offer discount +
    // 11% commission off-POS. revenue_ex_gst above is already NET of that; this
    // card surfaces what EatClub took (why revenue/GP dropped). $0 -> no redemptions.
    const give = toNum(day.eatclub_giveaway_ex_gst);
    if (!give) return { label: 'EatClub give-away', value: '—', sub: 'no EatClub redemptions', status: 'unknown' };
    const covers = toNum(day.eatclub_covers);
    const gross = toNum(day.revenue_ex_gst) + give;   // POS gross, before EatClub's cut
    const pct = gross ? give / gross * 100 : 0;
    return {
      label: 'EatClub give-away',
      value: '−' + fmtDollars(give),
      sub: `${fmtPct(pct)} of gross · ${covers} cover${covers === 1 ? '' : 's'} · discount + 11% commission, already off revenue`,
      status: 'unknown',
    };
  },
  overheads: (day, cfg) => {
    const rev = toNum(day.revenue_ex_gst);
    const days = day.days_included || 1;
    const ohA = overheadsDailyRate(STATE.currentVenue, winEnd(day));
    const ohf = ohFactor(day, STATE.currentVenue, days);
    const oc = wageOncostDaily(STATE.currentVenue, winEnd(day)) * ohf;
    const oh = (ohA ? ohA.rate : (OVERHEADS_WEEKLY[STATE.currentVenue] || 0) / 7) * ohf + oc;
    return { label: 'Overheads', value: rev ? fmtPct(oh / rev * 100) : '\u2014',
      sub: `${fmtDollars(oh)} \u00b7 rent + share of group OH (${ohA ? 'Xero ' + ohA.months + '-mo' : 'plan'}) \u00b7 DOW-weighted`, status: 'unknown' };
  },
  cogs: (day, cfg) => {
    const has = hasVal(day.cogs_pct);
    return {
      label: 'Expected COGS (Lightspeed)',
      value: has ? fmtPct(toNum(day.cogs_pct)) : '—',
      sub: (cfg.show_dollar_amounts ? fmtDollars(toNum(day.cogs_dollars)) : '') + (has ? ` · tgt ${fmtPct(COGS_TARGET_PCT)}` : ''),
      status: has ? cogsStatus(toNum(day.cogs_pct)) : day.cogs_alert,
    };
  },
  wages: (day, cfg) => {
    const tgt = wageTargetFor(day);
    let sub = cfg.show_dollar_amounts ? fmtDollars(toNum(day.wages_dollars)) : '';
    let status = day.wages_alert;
    let vs2 = '';
    if (tgt !== null && hasVal(day.wages_pct)) {
      const pv = toNum(day.wages_pct);
      vs2 = vsTarget(pv, tgt) + `<span class="vs-t">${String(day.date || '').length === 10 ? new Date(day.date).toLocaleDateString('en-AU', { weekday: 'short' }) : 'wk'}</span>`;
      status = pv > tgt + 2 ? 'red' : pv < tgt - 2 ? 'green' : 'amber';
    }
    return { label: 'Wages', value: hasVal(day.wages_pct) ? fmtPct(toNum(day.wages_pct)) : '—', vs: vs2, sub, status };
  },
  delivery: (day, cfg) => {
    // driver wages (history) + REAL platform fees (Xero monthly feed,
    // trailing 3-mo rate applied to this window's revenue).
    const rev = toNum(day.revenue_ex_gst);
    const endIso = String(day.date || '').includes(' — ') ? String(day.date).split(' — ')[1] : String(day.date || '');
    const dfr = deliveryFeesPct(STATE.currentVenue, endIso || isoDate(sydneyToday()));
    const fees = (dfr && rev) ? rev * dfr.pct / 100 : 0;
    const driver = toNum(day.delivery_dollars);
    const total = driver + fees;
    const pct = rev ? total / rev * 100 : null;
    return {
      label: 'Delivery',
      value: pct !== null ? fmtPct(pct) : '—',
      sub: cfg.show_dollar_amounts
        ? (fees ? `driver ${fmtDollars(driver)} + platform fees ${fmtDollars(fees)} (Xero)` : fmtDollars(driver))
        : '',
      status: day.delivery_alert,
    };
  },
  gp: (day, cfg) => {
    const has = hasVal(day.gp_pct);
    return {
      label: 'GP',
      value: has ? fmtPct(toNum(day.gp_pct)) : '—',
      sub: (cfg.show_dollar_amounts ? fmtDollars(toNum(day.gp_dollars)) : '') + (has ? ` · tgt ${fmtPct(100 - COGS_TARGET_PCT)}` : ''),
      status: has ? cogsStatus(100 - toNum(day.gp_pct)) : 'unknown',
    };
  },
  revenue_food: (day, cfg) => {
    const split = hasVal(day.food_ex_gst);
    return {
      label: split ? 'Food Revenue (ex-GST)' : 'Revenue (ex-GST)',
      value: fmtDollars(toNum(split ? day.food_ex_gst : day.revenue_ex_gst)),
      sub: day.days_included ? `${day.days_included} days` : day.date,
      status: 'unknown',
    };
  },
  revenue_bev: (day, cfg) => ({
    label: 'Bev Revenue (ex-GST)',
    value: hasVal(day.bev_ex_gst) ? fmtDollars(toNum(day.bev_ex_gst)) : '—',
    sub: day.days_included ? `${day.days_included} days` : day.date,
    status: 'unknown',
  }),
  cogs_food: (day, cfg) => {
    const split = hasVal(day.food_cogs_pct);
    return {
      label: 'Food COGS',
      value: split ? fmtPct(toNum(day.food_cogs_pct)) : hasVal(day.cogs_pct) && !hasVal(day.bev_ex_gst) ? fmtPct(toNum(day.cogs_pct)) : '—',
      vs: split ? vsTarget(toNum(day.food_cogs_pct), COGS_TARGET_PCT) : '',
      sub: split && cfg.show_dollar_amounts ? fmtDollars(toNum(day.food_cogs)) + ' / ' + fmtDollars(toNum(day.food_ex_gst)) + ` food rev` : 'awaiting split data',
      status: split ? cogsStatus(toNum(day.food_cogs_pct)) : 'unknown',
    };
  },
  cogs_bev: (day, cfg) => {
    const split = hasVal(day.bev_cogs_pct);
    return {
      label: 'Bev COGS',
      value: split ? fmtPct(toNum(day.bev_cogs_pct)) : '—',
      vs: split ? vsTarget(toNum(day.bev_cogs_pct), COGS_TARGET_PCT) : '',
      sub: split && cfg.show_dollar_amounts ? fmtDollars(toNum(day.bev_cogs)) + ' / ' + fmtDollars(toNum(day.bev_ex_gst)) + ` bev rev` : 'awaiting split data',
      status: split ? cogsStatus(toNum(day.bev_cogs_pct)) : 'unknown',
    };
  },
  wages_kitchen: (day, cfg) => {
    // Dept canon (2026-07-15): dept wages read against TOTAL venue revenue at
    // Stow and HG both — consistent with the venue-level wage target.
    const has = hasVal(day.wages_kitchen_dollars);
    const rev = toNum(day.revenue_ex_gst);
    const pct = has && rev ? toNum(day.wages_kitchen_dollars) / rev * 100 : null;
    const mixK = deptWageShares(STATE.currentVenue);
    const tK = wageTargetFor(day);
    const tgtK = tK !== null && mixK ? tK * mixK.k : null;
    let subK = has && cfg.show_dollar_amounts ? fmtDollars(toNum(day.wages_kitchen_dollars)) + ' vs total rev' : 'awaiting split data';
    let stK = has ? (day.wages_kitchen_alert || 'unknown') : 'unknown';
    if (tgtK !== null && pct !== null) {
      stK = pct > tgtK + 2 ? 'red' : pct < tgtK - 2 ? 'green' : 'amber';
    }
    return {
      label: 'Kitchen Wages',
      value: pct !== null ? fmtPct(pct) : '—',
      vs: vsTarget(pct, tgtK),
      sub: subK,
      status: stK,
    };
  },
  wages_foh: (day, cfg) => {
    const has = hasVal(day.wages_foh_dollars);
    const rev = toNum(day.revenue_ex_gst);
    const pct = has && rev ? toNum(day.wages_foh_dollars) / rev * 100 : null;
    const mixF = deptWageShares(STATE.currentVenue);
    const tF = wageTargetFor(day);
    const tgtF = tF !== null && mixF ? tF * mixF.f : null;
    let subF = has && cfg.show_dollar_amounts ? fmtDollars(toNum(day.wages_foh_dollars)) + ' vs total rev' : 'awaiting split data';
    let stF = has ? (day.wages_foh_alert || 'unknown') : 'unknown';
    if (tgtF !== null && pct !== null) {
      stF = pct > tgtF + 2 ? 'red' : pct < tgtF - 2 ? 'green' : 'amber';
    }
    return {
      label: 'FOH Wages',
      value: pct !== null ? fmtPct(pct) : '—',
      vs: vsTarget(pct, tgtF),
      sub: subF,
      status: stF,
    };
  },
  gp_food: (day, cfg) => {
    const split = hasVal(day.food_gp_pct);
    const v2 = split ? toNum(day.food_gp_pct) : hasVal(day.gp_pct) ? toNum(day.gp_pct) : null;
    return {
      label: split ? 'Food GP' : 'GP',
      value: v2 !== null ? fmtPct(v2) : '—',
      vs: v2 !== null ? vsTarget(v2, 100 - COGS_TARGET_PCT, 2, true) : '',
      sub: '',
      status: v2 !== null ? cogsStatus(100 - v2) : 'unknown',
    };
  },
  gp_bev: (day, cfg) => {
    const has = hasVal(day.bev_gp_pct);
    return {
      label: 'Bev GP',
      value: has ? fmtPct(toNum(day.bev_gp_pct)) : '—',
      vs: has ? vsTarget(toNum(day.bev_gp_pct), 100 - COGS_TARGET_PCT, 2, true) : '',
      sub: '',
      status: has ? cogsStatus(100 - toNum(day.bev_gp_pct)) : 'unknown',
    };
  },
};

function renderVenueTabs() {
  const roleCfg = ROLE_CONFIG[CURRENT_ROLE] || ROLE_CONFIG.admin;
  const tabsEl = document.getElementById('venue-tabs');

// Mon -> Sun of the CURRENT week (Sydney), as Date objects.
function currentWeekDays() {
  const mon = weekStart(sydneyToday());
  const out = [];
  for (let i = 0; i < 7; i++) out.push(addDays(mon, i));
  return out;
}
// One-row selector: a 7-day scrubber (Mon->Sun of this week, click = that date),
// a thin divider, then This week / Last week / This month pills and a More pill
// (a styled select) for the rest. Future days are muted and not clickable.
function renderTimeframeToggle() {
  const el = document.getElementById('timeframe-toggle');
  if (!el) return;
  const tf = STATE.currentTimeframe;
  const todayIso = isoDate(sydneyToday());
  const chips = currentWeekDays().map(d => {
    const iso = isoDate(d);
    const future = iso > todayIso;
    const active = tf === 'day' && iso === STATE.currentDay;
    const cls = ['tf-chip'];
    if (active) cls.push('active');
    if (future) cls.push('future');
    const wd = d.toLocaleDateString('en-AU', { weekday: 'short' });
    return `<button class="${cls.join(' ')}"${future ? ' disabled' : ` onclick="switchDay('${iso}')"`}>` +
           `<span class="tf-wd">${wd}</span><span class="tf-dt">${d.getDate()}</span></button>`;
  }).join('');
  const btn = (t, lbl) => `<button class="tf-btn${tf === t ? ' active' : ''}" onclick="switchTimeframe('${t}')">${lbl}</button>`;
  const moreOpts = [['lastmonth', 'Last month'], ['quarter', 'This quarter'], ['lastquarter', 'Last quarter'],
    ['thisfy', 'This FY'], ['lastfy', 'Last FY'], ['last12', 'Last 12 months'], ['all', 'All time'], ['range', 'Custom range…']];
  const moreOn = moreOpts.some(o => o[0] === tf);
  const moreSel = `<select id="tf-more" class="${moreOn ? 'active' : ''}" onchange="if(this.value)switchTimeframe(this.value)">` +
    `<option value="">More ▾</option>` +
    moreOpts.map(o => `<option value="${o[0]}"${moreOn && tf === o[0] ? ' selected' : ''}>${o[1]}</option>`).join('') +
    `</select>`;
  el.innerHTML =
    `<div class="tf-scrub">${chips}</div>` +
    `<span class="tf-div"></span>` +
    btn('week', 'This week') + btn('lastweek', 'Last week') + btn('month', 'This month') +
    moreSel;
}
function renderRangePicker() {

function applyRange() {
  const si = document.getElementById('range-start'), ei = document.getElementById('range-end');
  if (!si.value || !ei.value) return;
  STATE.rangeStart = si.value <= ei.value ? si.value : ei.value;
  STATE.rangeEnd   = si.value <= ei.value ? ei.value : si.value;

}

// Card lists: role config wins (slice-scoped roles like stowfood/bar carry
// their own cards, with blended fallbacks on Mari/Group), else venue default.
function cardsForCurrentView() {
  const venueCfg = VENUE_CONFIG[STATE.currentVenue];
  const roleCfg = ROLE_CONFIG[CURRENT_ROLE] || ROLE_CONFIG.admin;
  const base = (roleCfg.cards || venueCfg.cards);
  // Admin: revenue / COGS / wages / profit AND the delivery-fee / overhead cost
  // lines now all live in the dedicated #profit-card hero block (renderProfitCard).
  // The plain snapshot grid is therefore empty for admin — the kitchen roles keep
  // their own cards untouched.
  let list = (CURRENT_ROLE === 'admin')
    ? []
    : base.slice();
  // Retired cards: standalone GP (just 100 − COGS) and the EatClub give-away
  // (now folded into the profit breakdown as a cost line, not its own card).
  list = list.filter(k => k !== 'gp' && k !== 'eatclub');
  return list;
}

function renderSnapshot() {
  const venueCfg = VENUE_CONFIG[STATE.currentVenue];
  const roleCfg = ROLE_CONFIG[CURRENT_ROLE] || ROLE_CONFIG.admin;
  const cards = cardsForCurrentView();
  const cfg = { show_dollar_amounts: roleCfg.show_dollar_amounts };
  const rows = STATE.histories[STATE.currentVenue] || [];
  let anchorDay = STATE.currentDay;
  if (!anchorDay && rows.length) anchorDay = rows[rows.length - 1].date;
  const rangeRows = rowsForTimeframe(rows, STATE.currentTimeframe, anchorDay);
  const day = rollup(rangeRows);
  const titleEl = document.getElementById('snapshot-title');
  const dateEl  = document.getElementById('latest-date');
  const staleEl = document.getElementById('stale-badge');
  const tfLabel = { day: 'Selected day', week: 'This Week', lastweek: 'Last Week', month: 'This Month', lastmonth: 'Last Month', quarter: 'This Quarter', lastquarter: 'Last Quarter', thisfy: 'This FY', lastfy: 'Last FY', last12: 'Last 12 months', all: 'All time', range: 'Custom range' }[STATE.currentTimeframe];
  titleEl.textContent = `${venueCfg.label} · ${tfLabel}`;
  const snapshotEl = document.getElementById('snapshot');
  snapshotEl.className = 'grid' + (cards.length > 4 ? ' six' : '');
  // Empty card list (admin) — collapse the grid entirely so no empty bordered
  // box or leftover bottom margin sits between the profit card and the trend.
  snapshotEl.style.display = cards.length ? '' : 'none';
  if (!day) {
    dateEl.textContent = 'No data';
    staleEl.innerHTML = '';
    // No-data state respects the split card layout so the venue tab shows
    // exactly what it'll look like once the venue's Insights schedule fires.
    const ghostCards = cards.map(key => {
      const c = CARD_DEFS[key]({}, cfg);
      return `<div class="card unknown"><p class="label">${c.label}</p><p class="value">—</p><p class="sub">no data yet</p></div>`;
    }).join('');
    snapshotEl.innerHTML = ghostCards;
    const pcEl0 = document.getElementById('profit-card'); if (pcEl0) pcEl0.innerHTML = '';
    document.getElementById('dollar-strip').innerHTML = '';
    document.getElementById('split-snapshot').innerHTML = '';
    const waEl0 = document.getElementById('week-ahead'); if (waEl0) waEl0.innerHTML = '';
    const dhEl0 = document.getElementById('data-health'); if (dhEl0) dhEl0.innerHTML = '';
    const vbEl0 = document.getElementById('venue-breakdown'); if (vbEl0) vbEl0.innerHTML = '';
    const vEl0 = document.getElementById('verdict'); if (vEl0) vEl0.innerHTML = '';
    document.getElementById('trend-section').classList.add('hidden');
    return;
  }
  document.getElementById('trend-section').classList.remove('hidden');
  if (STATE.currentTimeframe === 'day') {
    dateEl.textContent = new Date(day.date).toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });
  } else {
    // A one-day range collapses to a single raw row (rollup returns it as-is),
    // so day.date has no " — " and no days_included — handle that, else the
    // label read "Invalid Date (undefined days)".
    const [s, e] = String(day.date).includes(' — ') ? day.date.split(' — ') : [day.date, day.date];
    const fmt = d => new Date(d).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
    const nDays = day.days_included || 1;
    dateEl.textContent = s === e ? `${fmt(s)} (1 day)` : `${fmt(s)} — ${fmt(e)} (${nDays} days)`;
  }
  staleEl.innerHTML = '';
  if (STATE.currentTimeframe === 'day') {
    // Staleness = how far the LATEST data is behind — never triggered by
    // deliberately browsing to an older day with the day pills.
    const latest = rows.length ? rows[rows.length - 1].date : null;
    const behind = latest ? Math.floor((sydneyToday() - new Date(latest)) / 86400000) - 1 : 0;
    if (behind > 0) staleEl.innerHTML = `<span class="stale">Latest data ${behind}d behind</span>`;
  }
  // Verdict line retired in the redesign — the profit hero block carries the
  // "did we make money?" answer now. Keep the container clear.
  const vEl = document.getElementById('verdict');
  if (vEl) vEl.innerHTML = '';
  const cardEls = cards.map(key => ({ key, ...CARD_DEFS[key](day, cfg) }));
  const clickable = CURRENT_ROLE === 'admin';
  // 30-day sparklines for the metrics with honest daily series
  const spark = {};
  if (CURRENT_ROLE === 'admin') {
    const last30 = rows.slice(-30);
    spark.revenue = last30.map(r => toNum(r.revenue_ex_gst) || null);
    spark.wages_hero = last30.map(r => hasVal(r.wages_pct) && toNum(r.revenue_ex_gst) ? toNum(r.wages_pct) : null);
    spark.cogs_merged = last30.map(r => toNum(r.revenue_ex_gst) ? toNum(r.cogs_pct) : null);
  }
  snapshotEl.innerHTML = cardEls.map(c =>
    `<div class="card ${c.status || 'unknown'}${clickable ? ' clickable' : ''}${STATE.focusMetric === c.key ? ' focused' : ''}"` +
    (clickable ? ` onclick="focusMetric('${c.key}')" title="Click to focus the chart on this metric"` : '') +
    `>${spark[c.key] ? sparkline(spark[c.key]) : ''}<p class="label">${c.label}</p><p class="value">${c.value}</p>${c.vs ? `<p class="vs">${c.vs}</p>` : ''}<p class="sub">${c.sub || ''}</p></div>`).join('');
  renderExtras(day, cfg);
}

function sparkline(vals) {
  const v = vals.filter(x => x !== null && isFinite(x));
  if (v.length < 5) return '';
  const min = Math.min(...v), max = Math.max(...v);
  const W = 72, H = 26;
  const pts = vals.map((x, i) => (x === null || !isFinite(x)) ? null :
    `${(i / (vals.length - 1) * W).toFixed(1)},${max === min ? H / 2 : (H - 2 - (x - min) / (max - min) * (H - 4)).toFixed(1)}`)
    .filter(Boolean).join(' ');
  const col = IS_DARK ? '#8B87D9' : '#7F77DD';
  return `<svg class="spark" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" opacity=".65"/></svg>`;
}

// Admin-only hero P&L block. Shows the closed/Xero ACTUAL profit when the whole
// window is booked, otherwise the EXPECTED (open period) breakdown: small
// revenue/COGS/wages cards, a 100%-of-gross stacked bar, and a cost-by-cost
// list where every % is a share of GROSS and the profit $ is unchanged.
function renderProfitCard(day, cfg) {
  const el = document.getElementById('profit-card');
  if (!el) return;
  el.innerHTML = '';
  if (CURRENT_ROLE !== 'admin' || !day) return;
  const fmtP = x => (x < 0 ? '−$' : '$') + Math.round(Math.abs(x)).toLocaleString();

  // DAILY = instant operational read: turnover, COGS, labour only. Fixed costs
  // (overheads, rent, owners' salary, interest, depreciation) and the profit line
  // are deliberately left off the day view — rent is paid whether or not we trade,
  // so folding it into a single day paints a false picture. Those live on the
  // weekly view. (Zak, 2026-07: "daily KPIs re wages, turnover and COGS are the
  // most important — instant reflection, then adjust labour.")
  if (periodIsOpen()) {
    const kpiLbl = STATE.currentTimeframe === 'day' ? 'Daily KPIs'
      : STATE.currentTimeframe === 'week' ? 'This week — KPIs'
      : STATE.currentTimeframe === 'month' ? 'This month — KPIs'
      : 'KPIs — period in progress';
    const w = pnlWindow(day);
    if (!w) {
      el.innerHTML = `<div class="pcard"><div class="pcard-head"><span class="pcard-lbl">${kpiLbl}</span></div>` +
        `<div class="pcard-hero" style="color:var(--ink-soft);font-size:22px">—</div>` +
        `<div class="pbrk-row"><span class="pbrk-l" style="font-size:12px;color:var(--ink-soft)">needs revenue + wages</span></div></div>`;
      return;
    }
    const eat = toNum(day.eatclub_giveaway_ex_gst);
    const gross = w.rev + eat;
    const pct = x => gross ? x / gross * 100 : 0;
    const cogsD = w.rev * w.cogsPct / 100;
    const cogsPctG = pct(cogsD), wagesPctG = pct(w.wages);
    const wTgt = wageTargetFor(day);
    const grpDisp = grossRev(day);
    const rows = STATE.histories[STATE.currentVenue] || [];
    let anchorDay = STATE.currentDay; if (!anchorDay && rows.length) anchorDay = rows[rows.length - 1].date;
    const yy = yoyRevenueDelta(rows, STATE.currentTimeframe, anchorDay);
    const revSub = yy !== null
      ? `<span class="${yy >= 0 ? 'vs-good' : 'vs-bad'}">${(yy >= 0 ? '+' : '−') + Math.abs(yy).toFixed(1)}%</span><span class="vs-t">vs LY</span>`
      : '';
    const oc = overheadChips();   // group-only admin + leave toggles (sit in the card head)
    const wagesLbl = 'Labour' + (STATE.currentVenue === 'group' ? ' (excl. admin)' : '');
    el.innerHTML =
      `<div class="pcard">` +
      `<div class="pcard-head"><span class="pcard-lbl">${kpiLbl}</span>${oc.chips}</div>` +
      oc.note +
      `<div class="pmini">` +
      `<div class="pmini-c"><p class="pmini-l">Turnover (gross)</p><p class="pmini-v">${fmtDollars(grpDisp)}</p><p class="pmini-s"></p></div>` +
      `<div class="pmini-c"><p class="pmini-l">COGS</p><p class="pmini-v">${fmtPct(cogsPctG)}</p><p class="pmini-s">${fmtDollars(cogsD)} · ${vsTarget(cogsPctG, COGS_TARGET_PCT)}</p></div>` +
      `<div class="pmini-c"><p class="pmini-l">${wagesLbl}</p><p class="pmini-v">${fmtPct(wagesPctG)}</p><p class="pmini-s">${fmtDollars(w.wages)}${wTgt !== null ? ' · ' + vsTarget(wagesPctG, wTgt) : ''}</p></div>` +
      `</div></div>`;
    return;
  }

  const ap = actualProfitWindow(day);
  if (ap) {
    // Closed period — actuals from Xero. Kept working, lightly restyled.
    const w0 = pnlWindow(day);
    const dlt = w0 ? ap.profit - w0.profit : null;
    const margin = ap.rev ? ap.profit / ap.rev * 100 : 0;
    const bits = [`COS ${fmtPct(ap.cos / ap.rev * 100)}`, `payroll ${fmtPct(ap.wages / ap.rev * 100)}`, `OH ${fmtDollars(ap.oh)}`];
    if (ap.df) bits.push(`platform fees ${fmtDollars(ap.df)}`);
    if (ap.fin) bits.push(`interest & dep ${fmtDollars(ap.fin)}`);
    if (dlt !== null) bits.push(`expected said ${fmtP(w0.profit)} (Δ ${fmtP(dlt)})`);
    bits.push(`${ap.nMonths} closed month${ap.nMonths > 1 ? 's' : ''}, stock journals posted`);
    const oc = overheadChips();
    el.innerHTML =
      `<div class="pcard${ap.profit >= 0 ? '' : ' neg'}">` +
      `<div class="pcard-head"><span class="pcard-lbl">Actual profit</span> ${pill('closed · Xero', 'green')}${oc.chips}</div>` +
      `<div class="pcard-hero${ap.profit >= 0 ? '' : ' neg'}">${fmtP(ap.profit)}<span class="pcard-margin"> · ${fmtPct(margin)} margin</span></div>` +
      oc.note +
      `<div class="pbrk"><div class="pbrk-row"><span class="pbrk-l" style="font-size:12px;color:var(--ink-soft)">${bits.join(' · ')}</span></div></div>` +
      `</div>`;
    return;
  }

  const w = pnlWindow(day);
  if (!w) {
    el.innerHTML = `<div class="pcard"><div class="pcard-head"><span class="pcard-lbl">Expected profit</span></div>` +
      `<div class="pcard-hero" style="color:var(--ink-soft);font-size:22px">—</div>` +
      `<div class="pbrk-row"><span class="pbrk-l" style="font-size:12px;color:var(--ink-soft)">needs revenue + wages</span></div></div>`;
    return;
  }

  const eat = toNum(day.eatclub_giveaway_ex_gst);
  const covers = toNum(day.eatclub_covers);
  const cogsD = w.rev * w.cogsPct / 100;
  // Gross base for this window. gross = net + give-away, so subtracting the
  // give-away as a cost leaves the profit $ EXACTLY equal to the net-based
  // value: (rev + eat) - cogs - wages - oh - df - cp - eat - fin = w.profit.
  const gross = w.rev + eat;
  const pct = x => gross ? x / gross * 100 : 0;
  const margin = pct(w.profit);
  const wTgt = wageTargetFor(day);
  const cogsPctG = pct(cogsD), wagesPctG = pct(w.wages);
  const grpDisp = grossRev(day);   // full-window gross for the headline revenue card

  // --- small cards: Revenue (gross) / COGS % vs tgt / Wages % vs tgt ---
  const rows = STATE.histories[STATE.currentVenue] || [];
  let anchorDay = STATE.currentDay;
  if (!anchorDay && rows.length) anchorDay = rows[rows.length - 1].date;
  const yy = yoyRevenueDelta(rows, STATE.currentTimeframe, anchorDay);
  const revSub = yy !== null
    ? `<span class="${yy >= 0 ? 'vs-good' : 'vs-bad'}">${(yy >= 0 ? '+' : '−') + Math.abs(yy).toFixed(1)}%</span><span class="vs-t">vs LY</span>`
    : '';
  const wagesLbl = 'Wages' + (STATE.currentVenue === 'group' ? ' (excl. admin)' : '');
  const mini =
    `<div class="pmini">` +
    `<div class="pmini-c"><p class="pmini-l">Revenue (gross)</p><p class="pmini-v">${fmtDollars(grpDisp)}</p><p class="pmini-s">${revSub}</p></div>` +
    `<div class="pmini-c"><p class="pmini-l">COGS</p><p class="pmini-v">${fmtPct(cogsPctG)}</p><p class="pmini-s">${vsTarget(cogsPctG, COGS_TARGET_PCT)}</p></div>` +
    `<div class="pmini-c"><p class="pmini-l">${wagesLbl}</p><p class="pmini-v">${fmtPct(wagesPctG)}</p><p class="pmini-s">${wTgt !== null ? vsTarget(wagesPctG, wTgt) : ''}</p></div>` +
    `</div>`;

  // --- 100%-of-gross stacked bar (reuses the old dollar-strip logic) ---
  const barDefs = [
    ['COGS', cogsD, '#D85A30'],
    ['Wages', w.wages, '#7F77DD'],
    ['Delivery', w.df, '#EF9F27'],
    ['EatClub give-away', eat, '#C86FA0'],
    ["Owners' salary", w.cp, '#D4537E'],
    ['Overheads', w.oh, '#888780'],
    ['Interest & dep', w.fin, '#5A5A70'],
  ].map(s => [s[0], pct(s[1]), s[2]]).filter(s => s[1] > 0.05);
  const profitPct = 100 - barDefs.reduce((t, s) => t + s[1], 0);
  const barSegs = barDefs.concat([['Expected profit', profitPct, profitPct >= 0 ? '#1D9E75' : '#E24B4A']]);
  const bar = '<div class="pcard-bar"><div class="strip-bar">' +
    barSegs.map(s => `<div style="width:${Math.max(0, Math.min(100, s[1])).toFixed(2)}%;background:${s[2]};" title="${s[0]} ${s[1].toFixed(1)}%"></div>`).join('') +
    '</div></div>';

  // --- breakdown list: each cost as a % of gross, with its target reference ---
  const refCol = st => st === 'red' ? 'var(--red)' : st === 'green' ? 'var(--green)' : 'var(--amber)';
  const line = (color, label, p, ref) =>
    `<div class="pbrk-row"><span class="pbrk-dot" style="background:${color}"></span>` +
    `<span class="pbrk-l">${label}</span><span class="pbrk-p">${fmtPct(p)}</span>` +
    `<span class="pbrk-r">${ref || ''}</span></div>`;
  const cogsRef = `<span style="color:${refCol(cogsStatus(cogsPctG))}">tgt ${fmtPct(COGS_TARGET_PCT)}</span>`;
  const wageSt = wTgt === null ? 'amber' : wagesPctG > wTgt + 2 ? 'red' : wagesPctG < wTgt - 2 ? 'green' : 'amber';
  const wageRef = wTgt !== null ? `<span style="color:${refCol(wageSt)}">tgt ${fmtPct(wTgt)}</span>` : '';
  let list = '';
  list += line('#D85A30', 'COGS', cogsPctG, cogsRef);
  list += line('#7F77DD', wagesLbl, wagesPctG, wageRef);
  list += line('#888780', 'Overheads', pct(w.oh), '');
  list += line('#EF9F27', 'Delivery platforms', pct(w.df), '');
  if (eat > 0.005) list += line('#C86FA0', 'EatClub give-away', pct(eat), `· ${covers} cover${covers === 1 ? '' : 's'}`);
  if (w.cp > 0.005) list += line('#D4537E', "Owners' salary", pct(w.cp), '');
  if (w.fin > 0.005) list += line('#5A5A70', 'Interest & dep', pct(w.fin), '');
  list +=
    `<div class="pbrk-row total"><span class="pbrk-dot" style="background:${profitPct >= 0 ? '#1D9E75' : '#E24B4A'}"></span>` +
    `<span class="pbrk-l">Expected profit</span><span class="pbrk-p">${fmtPct(margin)}</span>` +
    `<span class="pbrk-r">${fmtP(w.profit)}</span></div>`;

  const oc = overheadChips();
  el.innerHTML =
    `<div class="pcard${w.profit >= 0 ? '' : ' neg'}">` +
    `<div class="pcard-head"><span class="pcard-lbl">Expected profit</span> ${pill('open period', 'warn')}` +
    (w.partial ? ` <span style="font-size:11px;color:var(--ink-soft)">${w.wdays} of ${w.daysAll} days costed</span>` : '') + oc.chips + `</div>` +
    `<div class="pcard-hero${w.profit >= 0 ? '' : ' neg'}">${fmtP(w.profit)}<span class="pcard-margin"> · ${fmtPct(margin)} margin</span></div>` +
    oc.note +
    mini + bar + `<div class="pbrk">${list}</div>` +
    `</div>`;
}

// Wage targets: 30% weekly anchor (Zak, 2026-07-15), shaped by weekday.
// A prep-heavy Tuesday can't run the same % as a Saturday — each weekday's
// target = 30% x (its share of weekly wages / its share of weekly revenue),
// trailing 12 weeks. Revenue-weighted across the week = exactly 30%.
const WAGE_TARGET_PCT = 30;
const COGS_TARGET_PCT = 22;   // universal (Zak, 2026-07-15)
function cogsStatus(pct) { return pct > COGS_TARGET_PCT + 2 ? 'red' : pct < COGS_TARGET_PCT - 2 ? 'green' : 'amber'; }
function dowWageTarget(venue, dow) {
  STATE._dwt = STATE._dwt || {};
  if (STATE._dwt[venue] === undefined) {
    const rows = (STATE.histories[venue] || []).slice(-84);
    const wSum = [0, 0, 0, 0, 0, 0, 0], rSum = [0, 0, 0, 0, 0, 0, 0];
    for (const r of rows) {
      if (!hasVal(r.wages_dollars) || !toNum(r.revenue_ex_gst)) continue;
      const d = new Date(r.date).getDay();
      wSum[d] += toNum(r.wages_dollars);
      rSum[d] += toNum(r.revenue_ex_gst);
    }
    const wT = wSum.reduce((a, b) => a + b, 0), rT = rSum.reduce((a, b) => a + b, 0);
    STATE._dwt[venue] = wT && rT ? wSum.map((w, i) => rSum[i] ? WAGE_TARGET_PCT * (w / wT) / (rSum[i] / rT) : null) : null;
  }
  const t = STATE._dwt[venue];
  return t ? t[dow] : null;
}
// Target for a card's window: single day -> that weekday's shaped target;
// multi-day -> the flat 30% weekly anchor.
function wageTargetFor(day, venue = STATE.currentVenue) {
  const t = String((day && day.date) || '');
  if (/^\d{4}-\d{2}-\d{2}$/.test(t)) return dowWageTarget(venue, new Date(t).getDay());
  return WAGE_TARGET_PCT;
}

// Trailing dept wage mix (Kitchen vs FOH share of dept wages, last 12 weeks)
// — used to split a venue-level wage target across departments.
// Pass a `dow` to get that weekday's OWN mix (Zak, 2026-07-15): Stow's kitchen
// shuts Mondays, so a flat all-week mix hands Monday a kitchen budget for a
// kitchen that isn't open — the per-weekday mix reads ~0 kitchen and pushes
// that share to FOH, where the money actually goes. Thin weekdays fall back to
// the flat mix so a sparse history can't invent a wild split.
function deptWageShares(venue, dow) {
  const rows = (STATE.histories[venue] || []).slice(-84);
  let k = 0, f = 0;
  for (const r of rows) {
    if (dow !== undefined && new Date(r.date).getDay() !== dow) continue;
    k += toNum(r.wages_kitchen_dollars); f += toNum(r.wages_foh_dollars);
  }
  const t = k + f;
  if (dow !== undefined && t < 500) return deptWageShares(venue);
  return t ? { k: k / t, f: f / t } : null;
}

// Depts that normally work this weekday but have nothing rostered on it. A
// venue-level cell whose FOH is rostered and whose kitchen is empty is NOT
// under budget — it's half a roster (Zak, 2026-07-15). Judged against that
// weekday's own wage mix, so Stow's shut-Monday kitchen doesn't count as
// missing, and a venue that doesn't trade that day is skipped entirely.
function missingDepts(v, dIso, dow, deptOnly) {
  const vens = (STATE.roster.days || {})[dIso] || {};
  const out = [];
  for (const pk of (v === 'group' ? ['stow', 'hg', 'mari'] : [v])) {
    const mix = deptWageShares(pk, dow);
    if (!mix) continue;                                  // no split data (Mari) — can't judge
    if ((dowForecast(pk, dow) || 0) < 300) continue;     // venue shut this weekday
    const dd = vens[pk] || {};
    const kitShut = pk === 'stow' && dowDeptForecast(pk, dow).food < 150;
    const name = v === 'group' ? { stow: 'Stow', hg: 'HG', mari: 'Mari' }[pk] + ' ' : '';
    if ((!deptOnly || deptOnly === 'Kitchen') && mix.k > 0.05 && !kitShut && (dd.Kitchen || 0) < 25) out.push(name + 'kitchen');
    if ((!deptOnly || deptOnly === 'FOH') && mix.f > 0.05 && (dd.FOH || 0) < 25) out.push(name + 'FOH');
  }
  return out;
}

// One day's numbers for the week strip. Elapsed days read as ACTUALS (what it
// really cost, against what we really took); today and future read as ROSTER
// against the typical take for that weekday. Same target either way, so a
// payroll week can be totalled across the seam (Zak, 2026-07-15).
function waDay(v, dIso, deptOnly, todayIso) {
  const dow = new Date(dIso).getDay();
  const mixV = deptWageShares(v, dow);
  const deptShare = deptOnly && mixV ? (deptOnly === 'Kitchen' ? mixV.k : mixV.f) : 1;
  const dwt = dowWageTarget(v, dow);
  const target = dwt !== null ? dwt * deptShare : null;

  const hist = (STATE.histories[v] || []).find(r => r.date === dIso);
  // Actuals land the morning after, so "today" still reads as roster.
  const hasActual = dIso < todayIso && hist && toNum(hist.revenue_ex_gst) > 0 && hasVal(hist.wages_dollars);

  let wages = 0, rev = 0, mode = 'roster', noSplit = false;
  if (hasActual) {
    mode = 'actual';
    rev = toNum(hist.revenue_ex_gst);
    if (deptOnly === 'Kitchen') {
      if (hasVal(hist.wages_kitchen_dollars)) wages = toNum(hist.wages_kitchen_dollars); else noSplit = true;
    } else if (deptOnly === 'FOH') {
      if (hasVal(hist.wages_foh_dollars)) wages = toNum(hist.wages_foh_dollars); else noSplit = true;
    } else if (v === 'group') {
      wages = toNum(hist.wages_dollars);
    } else if (hasVal(hist.wages_kitchen_dollars) && hasVal(hist.wages_foh_dollars)) {
      // Kitchen + FOH excludes admin — matches the roster cells, which strip
      // Admin at venue level. Mixing the two conventions across the seam would
      // make the weekly total meaningless.
      wages = toNum(hist.wages_kitchen_dollars) + toNum(hist.wages_foh_dollars);
    } else {
      wages = toNum(hist.wages_dollars);
    }
  } else {
    rev = venueForecast(v, dow);
    const vens = (STATE.roster.days || {})[dIso] || {};
    if (deptOnly) {
      if (v === 'group') { for (const pk of ['stow', 'hg', 'mari']) wages += ((vens[pk] || {})[deptOnly]) || 0; }
      else wages = ((vens[v] || {})[deptOnly]) || 0;
    } else if (v === 'group') { for (const pk of ['stow', 'hg', 'mari']) wages += (vens[pk] || {}).total || 0; }
    else {
      // Admin wages reflect at GROUP level only (Zak, 2026-07-15) — venue
      // cells show the wages the venue can actually roster against its trade.
      const dv = vens[v] || {};
      wages = (dv.total || 0) - (dv.Admin || 0);
    }
  }

  // Closed trading days (HG shuts Sundays + Tuesdays) carry no budget.
  const closed = v !== 'group' && rev < 300;
  const kitClosed = deptOnly === 'Kitchen' && v === 'stow' && dowDeptForecast(v, dow).food < 150;
  // A ~$0 roster on a day that expects real trade means nobody has rostered it
  // yet — incomplete, not a win. Never true of an actual day.
  const unrostered = mode === 'roster' && !closed && !kitClosed && rev >= 300 && wages < 25;
  // Partly rostered: something IS on the day, but a dept that normally works it
  // isn't. The number is real but incomplete — it must not read as a win, and
  // it must not be totalled.
  const missing = (mode === 'roster' && !closed && !kitClosed && !unrostered) ? missingDepts(v, dIso, dow, deptOnly) : [];
  const budget = target !== null && rev ? target / 100 * rev : null;
  const pct = rev ? wages / rev * 100 : null;
  return { dIso, dow, mode, wages, rev, target, budget, pct, closed, kitClosed, unrostered, noSplit, missing, vens: (STATE.roster.days || {})[dIso] || {} };
}

// Week ahead: Deputy rostered $ (inc super, salaried synthesized) vs the
// typical revenue for that weekday = projected wage % you can still change.
function renderWeekAhead() {
  const el = document.getElementById('week-ahead');
  if (!el || !STATE.roster || !STATE.roster.days) return;
  const v = STATE.currentVenue;
  const todayIso = isoDate(sydneyToday());
  // Dept-scoped roles see THEIR department's forecast, not the venue's:
  // chef roles get Kitchen, bar gets FOH — judged against that dept's slice
  // of the DOW-shaped target. Admin + pizza see the whole venue.
  const ROLE_DEPT = { stowfood: 'Kitchen', hgfood: 'Kitchen', bigchef: 'Kitchen', bar: 'FOH' };
  const deptOnly = ROLE_DEPT[CURRENT_ROLE] || null;

  const thisMon = weekStart(sydneyToday());
  const blocks = [];
  for (let w = 0; w < 2; w++) {
    const b = renderWaWeek(addDays(thisMon, w * 7), w, v, deptOnly, todayIso);
    if (b) blocks.push(b);
  }
  if (!blocks.length) return;
  const gen = STATE.roster.generated ? new Date(STATE.roster.generated) : null;
  el.innerHTML = `<p class="strip-label">Payroll weeks — ${deptOnly ? deptOnly.toLowerCase() + ' ' : ''}roster vs target for the WEEK (elapsed days are actuals; the rest you can still change)</p>`
    + blocks.join('')
    + `<p style="font-size:11px;opacity:.55;margin:10px 0 0;">Deputy roster incl 12% super, salaried synthesized · typical rev = median of last 8 same weekdays · target 30% weekly, shaped by weekday (quiet days carry prep, so their day-target runs higher) and split across depts by that weekday's own wage mix · admin wages count at group level only${gen ? ` · roster as at ${gen.toLocaleString('en-AU', { day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit' })}` : ''}</p>`;
}

// One payroll week (Mon-Sun): seven cells plus the total that actually
// answers "are we up or down this week, in dollars".
function renderWaWeek(wkStart, wIdx, v, deptOnly, todayIso) {
  const isos = [];
  for (let i = 0; i < 7; i++) isos.push(isoDate(addDays(wkStart, i)));
  // Next week only appears once Deputy has a roster for it at all — but if the
  // roster exists and THIS dept isn't on it, we still show it, so the gap is
  // visible rather than silent.
  const anyRoster = isos.some(d => {
    const vens = (STATE.roster.days || {})[d];
    if (!vens) return false;
    return (v === 'group' ? ['stow', 'hg', 'mari'] : [v]).some(pk => ((vens[pk] || {}).total || 0) > 0);
  });
  const anyActual = isos.some(d => d < todayIso && (STATE.histories[v] || []).some(r => r.date === d && toNum(r.revenue_ex_gst) > 0));
  if (wIdx > 0 && !anyRoster) return null;
  if (wIdx === 0 && !anyRoster && !anyActual) return null;

  const data = isos.map(d => waDay(v, d, deptOnly, todayIso));
  const cells = data.map(D => waCellHtml(D, v, deptOnly, todayIso)).join('');

  // The total: only days that are actually accounted for. Closed days have no
  // budget; unrostered days aren't a win. Counting either would be a lie.
  let sumW = 0, sumB = 0, sumR = 0, counted = 0, nUnrostered = 0, nPartial = 0, nActual = 0;
  const missingSet = new Set();
  for (const D of data) {
    if (D.closed || D.kitClosed || D.noSplit) continue;
    if (D.unrostered) { nUnrostered++; continue; }
    if (D.missing && D.missing.length) { nPartial++; D.missing.forEach(m => missingSet.add(m)); continue; }
    if (D.budget === null) continue;
    sumW += D.wages; sumB += D.budget; sumR += D.rev; counted++;
    if (D.mode === 'actual') nActual++;
  }
  const label = wIdx === 0 ? 'This week' : 'Next week';
  const range = `${wkStart.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })} – ${addDays(wkStart, 6).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })}`;
  let totHtml;
  const gaps = missingSet.size ? Array.from(missingSet).join(', ') : null;
  // A week total drawn from a minority of its trading days isn't a week total —
  // a big red % off one rostered day would mislead exactly as much as the green
  // $0 did. Below half, report the gap and refuse to publish a number.
  const tradeable = counted + nUnrostered + nPartial;
  const tooThin = counted > 0 && counted * 2 < tradeable;
  if (!counted || tooThin) {
    const why = !counted
      ? (nPartial ? `${gaps} not rostered yet` : `${deptOnly ? deptOnly.toLowerCase() : 'roster'} not rostered yet`)
      : `only ${counted} of ${tradeable} trading days rostered${gaps ? ` — still missing ${gaps}` : ''}`;
    totHtml = `<div class="wa-tot"><span class="wa-tot-pct" style="opacity:.4;">—</span>
      <span class="wa-none">${why} — too little rostered to total the week</span></div>`;
  } else {
    const diff = sumW - sumB;
    const wpct = sumR ? sumW / sumR * 100 : null;
    const tpct = sumR ? sumB / sumR * 100 : null;
    const cls = tpct === null || wpct === null ? '' : wpct > tpct + 2 ? 'bad' : wpct < tpct - 2 ? 'good' : '';
    const verdict = Math.abs(diff) < 25
      ? `<b>on target</b>`
      : diff > 0 ? `<b class="wa-over">${fmtDollars(diff)} over target</b>`
                 : `<b class="wa-under">${fmtDollars(-diff)} under target</b>`;
    const notes = [];
    if (nActual) notes.push(`${nActual} day${nActual > 1 ? 's' : ''} actual, ${counted - nActual} rostered`);
    if (nUnrostered) notes.push(`${nUnrostered} day${nUnrostered > 1 ? 's' : ''} not rostered yet — excluded`);
    if (nPartial) notes.push(`${nPartial} day${nPartial > 1 ? 's' : ''} missing ${gaps} — excluded`);
    totHtml = `<div class="wa-tot ${cls}">
      <span class="wa-tot-pct">${wpct !== null ? fmtPct(wpct) : '—'}</span>
      <span>${fmtDollars(sumW)} of ${fmtDollars(sumB)} budget${tpct !== null ? ` · tgt ${fmtPct(tpct)}` : ''}</span>
      ${verdict}
      ${notes.length ? `<span class="wa-tot-note">${notes.join(' · ')}</span>` : ''}
    </div>`;
  }
  return `<div class="wa-week"><p class="wa-wk">${label} · ${range}</p><div class="wa-row">${cells}</div>${totHtml}</div>`;
}

function waCellHtml(D, v, deptOnly, todayIso) {
  const { dIso, dow, mode, wages, rev, target, budget, pct } = D;
  const vens = D.vens;
  const wd = new Date(dIso).toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
  const tag = dIso === todayIso ? ' · today' : mode === 'actual' ? ' · actual' : '';
  const head = `<p class="wa-day">${wd}${tag}</p>`;
  if (D.closed) {
    const mis = wages > 100;
    return `<div class="wa-cell ${mis ? 'bad' : ''}">${head}
      <p class="wa-pct" style="opacity:.45;">Closed</p>
      <p class="wa-sub">${mis ? 'but ' + fmtDollars(wages) + ' rostered — check Deputy' : 'no trade expected'}</p>
    </div>`;
  }
  if (D.kitClosed) {
    return `<div class="wa-cell ${wages > 100 ? 'bad' : ''}">${head}
      <p class="wa-pct" style="opacity:.45;">Closed</p>
      <p class="wa-sub">${wages > 100 ? 'but ' + fmtDollars(wages) + ' rostered — check Deputy' : 'kitchen shut'}</p>
    </div>`;
  }
  if (D.noSplit) {
    return `<div class="wa-cell">${head}
      <p class="wa-pct" style="opacity:.4;">—</p>
      <p class="wa-none">awaiting split data</p>
      <p class="wa-sub">took ${fmtDollars(rev)}</p>
    </div>`;
  }
  if (D.unrostered) {
    return `<div class="wa-cell">${head}
      <p class="wa-pct" style="opacity:.4;">—</p>
      <p class="wa-none">${deptOnly ? deptOnly.toLowerCase() : 'roster'} not rostered yet</p>
      <p class="wa-sub">typical rev ${fmtDollars(rev)}</p>
    </div>`;
  }
  // A day missing a dept can still be OVER (that's real — the cut stands), but
  // it can never be "good": the number is only low because the roster is
  // unfinished. Neutralise the green and name the gap.
  const partial = D.missing && D.missing.length > 0;
  // A day cell no longer renders a verdict against target (Zak, 2026-07-17).
  // The colour was the last of the per-day budget: it said "this Wednesday is
  // over" about a number you settle across the payroll week, not on the day.
  // It also lies during the OPEN week — a salaried person's whole weekly cost
  // lands on their first logged shift, so Wed 15 Jul read 185.5% red purely
  // because Renan hadn't worked the rest of his week yet. Nothing was wrong.
  // The week total still carries target vs roster; that's the real decision.
  const cls = '';
  const fcst = rev;
  let dept = '';
  if (!deptOnly && (v === 'stow' || v === 'hg')) {
    // Dept canon (Zak, 2026-07-15): BOTH venues read dept wages against TOTAL
    // venue revenue, and the venue wage target splits across depts by that
    // weekday's own wage mix — dept targets always sum to the venue target, so
    // hitting both = hitting the venue number by construction.
    const hist = (STATE.histories[v] || []).find(r => r.date === dIso);
    let kit, foh;
    if (mode === 'actual' && hist && hasVal(hist.wages_kitchen_dollars)) {
      kit = toNum(hist.wages_kitchen_dollars); foh = toNum(hist.wages_foh_dollars);
    } else if (mode === 'roster') {
      const dd = vens[v] || {};
      kit = dd.Kitchen || 0; foh = dd.FOH || 0;
    }
    if (kit !== undefined) {
      const df2 = dowDeptForecast(v, dow);
      const mix = deptWageShares(v, dow);
      const kT = target !== null && mix ? target * mix.k : null;
      const fT = target !== null && mix ? target * mix.f : null;
      const kp2 = fcst ? kit / fcst * 100 : null;
      const fp2 = fcst ? foh / fcst * 100 : null;
      // Dept lines are informational too — no target verdict (Zak, 2026-07-17).
      const col = () => '';
      const kClosed = v === 'stow' && df2.food < 150;
      const kLine = kClosed
        ? `<b>Kitchen</b> closed${kit > 100 ? ' · but ' + fmtDollars(kit) + ' rostered' : ''}`
        : `<b>Kitchen</b> <span${col(kp2, kT)}>${kp2 !== null ? fmtPct(kp2) : '—'}</span> of total · ${fmtDollars(kit)}`;
      const fLine = `<b>FOH</b> <span${col(fp2, fT)}>${fp2 !== null ? fmtPct(fp2) : '—'}</span> of total · ${fmtDollars(foh)}`;
      dept = `<p class="wa-dept">${kLine}<br>${fLine}</p>`;
    }
  }
  // No per-day budget, target or cut-$X here any more (Zak, 2026-07-16: "the
  // daily wage budget is too noisy"). A day's budget was never a real decision
  // anyway — you don't balance the books on a Tuesday, you balance them over the
  // payroll week, and a quiet Tuesday against a shaped Tuesday target produced a
  // lot of red that meant nothing. The week total carries target vs roster; a
  // cell just shows what's on. The colour went too (2026-07-17) — same reason,
  // and because in the open week it flags salaried allocation artefacts as if
  // they were overspend.
  // The one exception is a MISSING dept — that's not budget noise, it's the
  // roster being unfinished, and it has to stay visible. Likewise a CLOSED day
  // with wages rostered on it stays red: that's a Deputy error, not a verdict.
  const gap = partial ? `<p class="wa-none">${D.missing.join(' + ')} not rostered yet</p>` : '';
  return `<div class="wa-cell ${cls}">${head}
    <p class="wa-pct">${pct !== null ? fmtPct(pct) : '—'}</p>
    <p class="wa-sub">${mode === 'actual' ? 'wages' : 'roster'} ${fmtDollars(wages)}<br>${mode === 'actual' ? 'took' : 'typical rev'} ${rev ? fmtDollars(rev) : '—'}</p>
    ${gap}
    ${dept}
  </div>`;
}

// Group view: one table answering "who made the money?" for the selected
// window. Rows link through to the venue tabs.
function renderVenueBreakdown() {
  const el = document.getElementById('venue-breakdown');
  if (!el) return;
  el.innerHTML = '';
  if (STATE.currentVenue !== 'group') return;
  const open = periodIsOpen();
  const showProfit = !open;   // open period (this week / today) = KPIs only, no profit/margin
  const showLY = !open;       // vs-LY on an in-progress period is misleading (partial vs full)
  const body = [['stow', 'Stowaway'], ['hg', 'Harry Gatos'], ['mari', "Marilyna's"]].map(([vk, lbl]) => {
    const rows = STATE.histories[vk] || [];
    let anchorDay = STATE.currentDay;
    if (!anchorDay && rows.length) anchorDay = rows[rows.length - 1].date;
    const day = rollup(rowsForTimeframe(rows, STATE.currentTimeframe, anchorDay));
    if (!day) return '';
    const rev = grossRev(day);   // gross, to match the rest of the redesign
    const yoy = yoyRevenueDelta(rows, STATE.currentTimeframe, anchorDay);
    const w = pnlWindow(day, vk);
    const a = actualCogs(vk, winEnd(day));
    const yoyCell = yoy !== null
      ? `<span class="${yoy >= 0 ? 'vb-pos' : 'vb-neg'}">${(yoy >= 0 ? '+' : '−') + Math.abs(yoy).toFixed(1)}%</span>` : '—';
    const profitCell = w
      ? `<span class="${w.profit >= 0 ? 'vb-pos' : 'vb-neg'}">${(w.profit < 0 ? '−$' : '$') + Math.round(Math.abs(w.profit)).toLocaleString()}</span>` : '—';
    const marginPct = w && w.rev ? w.profit / w.rev * 100 : null;
    const marginCell = marginPct !== null
      ? `<span class="${marginPct >= 0 ? 'vb-pos' : 'vb-neg'}">${fmtPct(marginPct)}</span>` : '—';
    return `<tr class="vbx-row ${vk}" onclick="switchVenue('${vk}')">
      <td class="vbx-venue"><span class="vbx-dot"></span>${lbl}</td>
      <td>${fmtDollars(rev)}</td>
      ${showLY ? '<td>' + yoyCell + '</td>' : ''}
      <td>${hasVal(day.wages_pct) ? fmtPct(toNum(day.wages_pct)) : '—'}</td>
      <td>${a ? fmtPct(a.pct) : hasVal(day.cogs_pct) ? fmtPct(toNum(day.cogs_pct)) : '—'}</td>
      ${showProfit ? `<td>${profitCell}</td><td>${marginCell}</td>` : ''}
    </tr>`;
  }).join('');
  if (!body) return;
  el.innerHTML = `<div class="vbx">
    <p class="vbx-title">Per-venue breakdown</p>
    <div class="vbx-scroll"><table class="vb-table vbx-table">
    <thead><tr><th>Venue</th><th>Revenue</th>${showLY ? '<th>vs LY</th>' : ''}<th>Wages</th><th>COGS</th>${showProfit ? '<th>Exp. profit</th><th>Margin</th>' : ''}</tr></thead>
    <tbody>${body}</tbody></table></div></div>`;
}

// Pipeline health: is every number on this page trustworthy right now?
function dhChip(lbl, cls, detail) {
  dhChip._cls.push(cls);
  dhChip._items.push({ lbl, cls, detail });
  return '';
}
function renderDataHealth() {
  const el = document.getElementById('data-health');
  if (!el) return;
  dhChip._cls = [];
  dhChip._items = [];
  const chips = [];
  const y = isoDate(addDays(sydneyToday(), -1));
  for (const [pk, lbl] of [['stow', 'Stow'], ['hg', 'HG'], ['mari', 'Mari']]) {
    const r = (STATE.histories[pk] || []).find(x => x.date === y);
    // Closed-day allowance: if this venue's typical take for that weekday is
    // ~nothing (HG is shut Tuesdays), an empty day is normal, not a failure.
    const typ = dowForecast(pk, new Date(y).getDay());
    if ((!r || !toNum(r.revenue_ex_gst)) && typ < 300) chips.push(dhChip(lbl, 'ok', 'closed ' + new Date(y).toLocaleDateString('en-AU', { weekday: 'long' }) + 's'));
    else if (!r || !toNum(r.revenue_ex_gst)) chips.push(dhChip(lbl, 'bad', 'no sales for yesterday yet'));
    else if (!hasVal(r.wages_dollars)) chips.push(dhChip(lbl, 'warn', 'sales in · wages pending approval (12:10pm re-pull)'));
    else chips.push(dhChip(lbl, 'ok', 'yesterday complete'));
  }
  const wks = [...new Set(STATE.xeroCogs.map(r => r.week_ending))].sort();
  if (wks.length) {
    const age = Math.floor((sydneyToday() - new Date(wks[wks.length - 1])) / 86400000);
    chips.push(dhChip('Xero purchases', age <= 13 ? 'ok' : 'warn', `to w/e ${wks[wks.length - 1]}` + (age > 13 ? ' — stale, check the Monday pull' : '')));
  } else chips.push(dhChip('Xero purchases', 'bad', 'feed missing'));
  const closed = closedMonthsSet();
  const curMonth = isoDate(sydneyToday()).slice(0, 7);
  const mos = STATE.xeroOH.map(r => r.month).filter(m => m && m < curMonth).sort();
  const missing = mos.filter(m => !closed.has(m));
  if (missing.length) chips.push(dhChip('Stock journals', 'warn', 'missing ' + missing.map(m => new Date(m + '-01').toLocaleDateString('en-AU', { month: 'short' })).join(', ') + ' — chase accounts; Actual Profit unlocks when posted'));
  else if (mos.length) chips.push(dhChip('Stock journals', 'ok', 'posted through ' + new Date(mos[mos.length - 1] + '-01').toLocaleDateString('en-AU', { month: 'short' })));
  if (STATE.roster && STATE.roster.generated) {
    const ageH = (Date.now() - new Date(STATE.roster.generated).getTime()) / 3600000;
    chips.push(dhChip('Roster feed', ageH < 26 ? 'ok' : 'warn', ageH < 26 ? 'fresh' : Math.round(ageH) + 'h old'));
  } else chips.push(dhChip('Roster feed', 'warn', 'not pulled yet — first run 6:45am'));
  const bad = dhChip._items.filter(i => i.cls !== 'ok');
  const dot = bad.some(i => i.cls === 'bad') ? '#E24B4A' : bad.length ? '#EF9F27' : '#1D9E75';
  const msg = bad.length
    ? bad.map(i => `<strong>${i.lbl}</strong> ${i.detail}`).join(' · ') + ' — everything else healthy'
    : 'All pipelines healthy — sales, wages, Xero purchases, stock journals, roster';
  el.innerHTML = `<p class="dh-line"><span class="dh-dot" style="background:${dot};"></span><span>${msg}</span></p>`;
}

let HOURLY_CHART = null;
function renderChart() {
  const venueCfg = VENUE_CONFIG[STATE.currentVenue];

    const dailyBins = trailing.length <= 45;

    }

      const ohOf = (k, B = bins) => dailyBins && sh ? ohcDaily * 7 * sh[new Date(k).getDay()] : ohcDaily * B[k].days;
      const t = STATE.baselines[STATE.currentVenue] || {};
      const a = actualCogs(STATE.currentVenue, endIso);
