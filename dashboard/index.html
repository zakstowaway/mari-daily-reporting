// Wage targets: 30% weekly anchor (Zak, 2026-07-15), shaped by weekday.
// A prep-heavy Tuesday can't run the same % as a Saturday — each weekday's
// target = 30% x (its share of weekly wages / its share of weekly revenue),
// trailing 12 weeks. Revenue-weighted across the week = exactly 30%.
const WAGE_TARGET_PCT = 30;
const COGS_TARGET_PCT = 22;   // universal (Zak, 2026-07-15)
function cogsStatus(pct) { return pct > COGS_TARGET_PCT + 2 ? 'red' : pct < COGS_TARGET_PCT - 2 ? 'green' : 'amber'; }
function dowWageTarget(venue, dow) {
  STATE._dwt = STATE._dwt || {};
  if (STATE._dwt[venue] === undefined) {
    const rows = (STATE.histories[venue] || []).slice(-84);
    const wSum = [0, 0, 0, 0, 0, 0, 0], rSum = [0, 0, 0, 0, 0, 0, 0];
    for (const r of rows) {
      if (!hasVal(r.wages_dollars) || !toNum(r.revenue_ex_gst)) continue;
      const d = new Date(r.date).getDay();
      wSum[d] += toNum(r.wages_dollars);
      rSum[d] += toNum(r.revenue_ex_gst);
    }
    const wT = wSum.reduce((a, b) => a + b, 0), rT = rSum.reduce((a, b) => a + b, 0);
    STATE._dwt[venue] = wT && rT ? wSum.map((w, i) => rSum[i] ? WAGE_TARGET_PCT * (w / wT) / (rSum[i] / rT) : null) : null;
  }
  const t = STATE._dwt[venue];
  return t ? t[dow] : null;
}
// Target for a card's window: single day -> that weekday's shaped target;
// multi-day -> the flat 30% weekly anchor.
function wageTargetFor(day, venue = STATE.currentVenue) {
  const t = String((day && day.date) || '');
  if (/^\d{4}-\d{2}-\d{2}$/.test(t)) return dowWageTarget(venue, new Date(t).getDay());
  return WAGE_TARGET_PCT;
}

// Trailing dept wage mix (Kitchen vs FOH share of dept wages, last 12 weeks)
// — used to split a venue-level wage target across departments.
// Pass a `dow` to get that weekday's OWN mix (Zak, 2026-07-15): Stow's kitchen
// shuts Mondays, so a flat all-week mix hands Monday a kitchen budget for a
// kitchen that isn't open — the per-weekday mix reads ~0 kitchen and pushes
// that share to FOH, where the money actually goes. Thin weekdays fall back to
// the flat mix so a sparse history can't invent a wild split.
function deptWageShares(venue, dow) {
  const rows = (STATE.histories[venue] || []).slice(-84);
  let k = 0, f = 0;
  for (const r of rows) {
    if (dow !== undefined && new Date(r.date).getDay() !== dow) continue;
    k += toNum(r.wages_kitchen_dollars); f += toNum(r.wages_foh_dollars);
  }
  const t = k + f;
  if (dow !== undefined && t < 500) return deptWageShares(venue);
  return t ? { k: k / t, f: f / t } : null;
}

// Depts that normally work this weekday but have nothing rostered on it. A
// venue-level cell whose FOH is rostered and whose kitchen is empty is NOT
// under budget — it's half a roster (Zak, 2026-07-15). Judged against that
// weekday's own wage mix, so Stow's shut-Monday kitchen doesn't count as
// missing, and a venue that doesn't trade that day is skipped entirely.
function missingDepts(v, dIso, dow, deptOnly) {
  const vens = (STATE.roster.days || {})[dIso] || {};
  const out = [];
  for (const pk of (v === 'group' ? ['stow', 'hg', 'mari'] : [v])) {
    const mix = deptWageShares(pk, dow);
    if (!mix) continue;                                  // no split data (Mari) — can't judge
    if ((dowForecast(pk, dow) || 0) < 300) continue;     // venue shut this weekday
    const dd = vens[pk] || {};
    const kitShut = pk === 'stow' && dowDeptForecast(pk, dow).food < 150;
    const name = v === 'group' ? { stow: 'Stow', hg: 'HG', mari: 'Mari' }[pk] + ' ' : '';
    if ((!deptOnly || deptOnly === 'Kitchen') && mix.k > 0.05 && !kitShut && (dd.Kitchen || 0) < 25) out.push(name + 'kitchen');
    if ((!deptOnly || deptOnly === 'FOH') && mix.f > 0.05 && (dd.FOH || 0) < 25) out.push(name + 'FOH');
  }
  return out;
}

// One day's numbers for the week strip. Elapsed days read as ACTUALS (what it
// really cost, against what we really took); today and future read as ROSTER
// against the typical take for that weekday. Same target either way, so a
// payroll week can be totalled across the seam (Zak, 2026-07-15).
function waDay(v, dIso, deptOnly, todayIso) {
  const dow = new Date(dIso).getDay();
  const mixV = deptWageShares(v, dow);
  const deptShare = deptOnly && mixV ? (deptOnly === 'Kitchen' ? mixV.k : mixV.f) : 1;
  const dwt = dowWageTarget(v, dow);
  const target = dwt !== null ? dwt * deptShare : null;

  const hist = (STATE.histories[v] || []).find(r => r.date === dIso);
  // Actuals land the morning after, so "today" still reads as roster.
  const hasActual = dIso < todayIso && hist && toNum(hist.revenue_ex_gst) > 0 && hasVal(hist.wages_dollars);

  let wages = 0, rev = 0, mode = 'roster', noSplit = false;
  if (hasActual) {
    mode = 'actual';
    rev = toNum(hist.revenue_ex_gst);
    if (deptOnly === 'Kitchen') {
      if (hasVal(hist.wages_kitchen_dollars)) wages = toNum(hist.wages_kitchen_dollars); else noSplit = true;
    } else if (deptOnly === 'FOH') {
      if (hasVal(hist.wages_foh_dollars)) wages = toNum(hist.wages_foh_dollars); else noSplit = true;
    } else if (v === 'group') {
      wages = toNum(hist.wages_dollars);
    } else if (hasVal(hist.wages_kitchen_dollars) && hasVal(hist.wages_foh_dollars)) {
      // Kitchen + FOH excludes admin — matches the roster cells, which strip
      // Admin at venue level. Mixing the two conventions across the seam would
      // make the weekly total meaningless.
      wages = toNum(hist.wages_kitchen_dollars) + toNum(hist.wages_foh_dollars);
    } else {
      wages = toNum(hist.wages_dollars);
    }
  } else {
    rev = venueForecast(v, dow);
    const vens = (STATE.roster.days || {})[dIso] || {};
    if (deptOnly) {
      if (v === 'group') { for (const pk of ['stow', 'hg', 'mari']) wages += ((vens[pk] || {})[deptOnly]) || 0; }
      else wages = ((vens[v] || {})[deptOnly]) || 0;
    } else if (v === 'group') { for (const pk of ['stow', 'hg', 'mari']) wages += (vens[pk] || {}).total || 0; }
    else {
      // Admin wages reflect at GROUP level only (Zak, 2026-07-15) — venue
      // cells show the wages the venue can actually roster against its trade.
      const dv = vens[v] || {};
      wages = (dv.total || 0) - (dv.Admin || 0);
    }
  }

  // Closed trading days (HG shuts Sundays + Tuesdays) carry no budget.
  const closed = v !== 'group' && rev < 300;
  const kitClosed = deptOnly === 'Kitchen' && v === 'stow' && dowDeptForecast(v, dow).food < 150;
  // A ~$0 roster on a day that expects real trade means nobody has rostered it
  // yet — incomplete, not a win. Never true of an actual day.
  const unrostered = mode === 'roster' && !closed && !kitClosed && rev >= 300 && wages < 25;
  // Partly rostered: something IS on the day, but a dept that normally works it
  // isn't. The number is real but incomplete — it must not read as a win, and
  // it must not be totalled.
  const missing = (mode === 'roster' && !closed && !kitClosed && !unrostered) ? missingDepts(v, dIso, dow, deptOnly) : [];
  const budget = target !== null && rev ? target / 100 * rev : null;
  const pct = rev ? wages / rev * 100 : null;
  return { dIso, dow, mode, wages, rev, target, budget, pct, closed, kitClosed, unrostered, noSplit, missing, vens: (STATE.roster.days || {})[dIso] || {} };
}

// Week ahead: Deputy rostered $ (inc super, salaried synthesized) vs the
// typical revenue for that weekday = projected wage % you can still change.
function renderWeekAhead() {
  const el = document.getElementById('week-ahead');
  if (!el || !STATE.roster || !STATE.roster.days) return;
  const v = STATE.currentVenue;
  const todayIso = isoDate(sydneyToday());
  // Dept-scoped roles see THEIR department's forecast, not the venue's:
  // chef roles get Kitchen, bar gets FOH — judged against that dept's slice
  // of the DOW-shaped target. Admin + pizza see the whole venue.
  const ROLE_DEPT = { stowfood: 'Kitchen', hgfood: 'Kitchen', bigchef: 'Kitchen', bar: 'FOH' };
  const deptOnly = ROLE_DEPT[CURRENT_ROLE] || null;

  const thisMon = weekStart(sydneyToday());
  const blocks = [];
  for (let w = 0; w < 2; w++) {
    const b = renderWaWeek(addDays(thisMon, w * 7), w, v, deptOnly, todayIso);
    if (b) blocks.push(b);
  }
  if (!blocks.length) return;
  const gen = STATE.roster.generated ? new Date(STATE.roster.generated) : null;
  el.innerHTML = `<p class="strip-label">Payroll weeks — ${deptOnly ? deptOnly.toLowerCase() + ' ' : ''}roster vs target for the WEEK (elapsed days are actuals; the rest you can still change)</p>`
    + blocks.join('')
    + `<p style="font-size:11px;opacity:.55;margin:10px 0 0;">Deputy roster incl 12% super, salaried synthesized · typical rev = median of last 8 same weekdays · target 30% weekly, shaped by weekday (quiet days carry prep, so their day-target runs higher) and split across depts by that weekday's own wage mix · admin wages count at group level only${gen ? ` · roster as at ${gen.toLocaleString('en-AU', { day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit' })}` : ''}</p>`;
}

// One payroll week (Mon-Sun): seven cells plus the total that actually
// answers "are we up or down this week, in dollars".
function renderWaWeek(wkStart, wIdx, v, deptOnly, todayIso) {
  const isos = [];
  for (let i = 0; i < 7; i++) isos.push(isoDate(addDays(wkStart, i)));
  // Next week only appears once Deputy has a roster for it at all — but if the
  // roster exists and THIS dept isn't on it, we still show it, so the gap is
  // visible rather than silent.
  const anyRoster = isos.some(d => {
    const vens = (STATE.roster.days || {})[d];
    if (!vens) return false;
    return (v === 'group' ? ['stow', 'hg', 'mari'] : [v]).some(pk => ((vens[pk] || {}).total || 0) > 0);
  });
  const anyActual = isos.some(d => d < todayIso && (STATE.histories[v] || []).some(r => r.date === d && toNum(r.revenue_ex_gst) > 0));
  if (wIdx > 0 && !anyRoster) return null;
  if (wIdx === 0 && !anyRoster && !anyActual) return null;

  const data = isos.map(d => waDay(v, d, deptOnly, todayIso));
  const cells = data.map(D => waCellHtml(D, v, deptOnly, todayIso)).join('');

  // The total: only days that are actually accounted for. Closed days have no
  // budget; unrostered days aren't a win. Counting either would be a lie.
  let sumW = 0, sumB = 0, sumR = 0, counted = 0, nUnrostered = 0, nPartial = 0, nActual = 0;
  const missingSet = new Set();
  for (const D of data) {
    if (D.closed || D.kitClosed || D.noSplit) continue;
    if (D.unrostered) { nUnrostered++; continue; }
    if (D.missing && D.missing.length) { nPartial++; D.missing.forEach(m => missingSet.add(m)); continue; }
    if (D.budget === null) continue;
    sumW += D.wages; sumB += D.budget; sumR += D.rev; counted++;
    if (D.mode === 'actual') nActual++;
  }
  const label = wIdx === 0 ? 'This week' : 'Next week';
  const range = `${wkStart.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })} – ${addDays(wkStart, 6).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })}`;
  let totHtml;
  const gaps = missingSet.size ? Array.from(missingSet).join(', ') : null;
  // A week total drawn from a minority of its trading days isn't a week total —
  // a big red % off one rostered day would mislead exactly as much as the green
  // $0 did. Below half, report the gap and refuse to publish a number.
  const tradeable = counted + nUnrostered + nPartial;
  const tooThin = counted > 0 && counted * 2 < tradeable;
  if (!counted || tooThin) {
    const why = !counted
      ? (nPartial ? `${gaps} not rostered yet` : `${deptOnly ? deptOnly.toLowerCase() : 'roster'} not rostered yet`)
      : `only ${counted} of ${tradeable} trading days rostered${gaps ? ` — still missing ${gaps}` : ''}`;
    totHtml = `<div class="wa-tot"><span class="wa-tot-pct" style="opacity:.4;">—</span>
      <span class="wa-none">${why} — too little rostered to total the week</span></div>`;
  } else {
    const diff = sumW - sumB;
    const wpct = sumR ? sumW / sumR * 100 : null;
    const tpct = sumR ? sumB / sumR * 100 : null;
    const cls = tpct === null || wpct === null ? '' : wpct > tpct + 2 ? 'bad' : wpct < tpct - 2 ? 'good' : '';
    const verdict = Math.abs(diff) < 25
      ? `<b>on target</b>`
      : diff > 0 ? `<b class="wa-over">${fmtDollars(diff)} over target</b>`
                 : `<b class="wa-under">${fmtDollars(-diff)} under target</b>`;
    const notes = [];
    if (nActual) notes.push(`${nActual} day${nActual > 1 ? 's' : ''} actual, ${counted - nActual} rostered`);
    if (nUnrostered) notes.push(`${nUnrostered} day${nUnrostered > 1 ? 's' : ''} not rostered yet — excluded`);
    if (nPartial) notes.push(`${nPartial} day${nPartial > 1 ? 's' : ''} missing ${gaps} — excluded`);
    totHtml = `<div class="wa-tot ${cls}">
      <span class="wa-tot-pct">${wpct !== null ? fmtPct(wpct) : '—'}</span>
      <span>${fmtDollars(sumW)} of ${fmtDollars(sumB)} budget${tpct !== null ? ` · tgt ${fmtPct(tpct)}` : ''}</span>
      ${verdict}
      ${notes.length ? `<span class="wa-tot-note">${notes.join(' · ')}</span>` : ''}
    </div>`;
  }
  return `<div class="wa-week"><p class="wa-wk">${label} · ${range}</p><div class="wa-row">${cells}</div>${totHtml}</div>`;
}

function waCellHtml(D, v, deptOnly, todayIso) {
  const { dIso, dow, mode, wages, rev, target, budget, pct } = D;
  const vens = D.vens;
  const wd = new Date(dIso).toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
  const tag = dIso === todayIso ? ' · today' : mode === 'actual' ? ' · actual' : '';
  const head = `<p class="wa-day">${wd}${tag}</p>`;
  if (D.closed) {
    const mis = wages > 100;
    return `<div class="wa-cell ${mis ? 'bad' : ''}">${head}
      <p class="wa-pct" style="opacity:.45;">Closed</p>
      <p class="wa-sub">${mis ? 'but ' + fmtDollars(wages) + ' rostered — check Deputy' : 'no trade expected'}</p>
    </div>`;
  }
  if (D.kitClosed) {
    return `<div class="wa-cell ${wages > 100 ? 'bad' : ''}">${head}
      <p class="wa-pct" style="opacity:.45;">Closed</p>
      <p class="wa-sub">${wages > 100 ? 'but ' + fmtDollars(wages) + ' rostered — check Deputy' : 'kitchen shut'}</p>
    </div>`;
  }
  if (D.noSplit) {
    return `<div class="wa-cell">${head}
      <p class="wa-pct" style="opacity:.4;">—</p>
      <p class="wa-none">awaiting split data</p>
      <p class="wa-sub">took ${fmtDollars(rev)}</p>
    </div>`;
  }
  if (D.unrostered) {
    return `<div class="wa-cell">${head}
      <p class="wa-pct" style="opacity:.4;">—</p>
      <p class="wa-none">${deptOnly ? deptOnly.toLowerCase() : 'roster'} not rostered yet</p>
      <p class="wa-sub">typical rev ${fmtDollars(rev)}</p>
    </div>`;
  }
  // A day missing a dept can still be OVER (that's real — the cut stands), but
  // it can never be "good": the number is only low because the roster is
  // unfinished. Neutralise the green and name the gap.
  const partial = D.missing && D.missing.length > 0;
  // A day cell no longer renders a verdict against target (Zak, 2026-07-17).
  // The colour was the last of the per-day budget: it said "this Wednesday is
  // over" about a number you settle across the payroll week, not on the day.
  // It also lies during the OPEN week — a salaried person's whole weekly cost
  // lands on their first logged shift, so Wed 15 Jul read 185.5% red purely
  // because Renan hadn't worked the rest of his week yet. Nothing was wrong.
  // The week total still carries target vs roster; that's the real decision.
  const cls = '';
  const fcst = rev;
  let dept = '';
  if (!deptOnly && (v === 'stow' || v === 'hg')) {
    // Dept canon (Zak, 2026-07-15): BOTH venues read dept wages against TOTAL
    // venue revenue, and the venue wage target splits across depts by that
    // weekday's own wage mix — dept targets always sum to the venue target, so
    // hitting both = hitting the venue number by construction.
    const hist = (STATE.histories[v] || []).find(r => r.date === dIso);
    let kit, foh;
    if (mode === 'actual' && hist && hasVal(hist.wages_kitchen_dollars)) {
      kit = toNum(hist.wages_kitchen_dollars); foh = toNum(hist.wages_foh_dollars);
    } else if (mode === 'roster') {
      const dd = vens[v] || {};
      kit = dd.Kitchen || 0; foh = dd.FOH || 0;
    }
    if (kit !== undefined) {
      const df2 = dowDeptForecast(v, dow);
      const mix = deptWageShares(v, dow);
      const kT = target !== null && mix ? target * mix.k : null;
      const fT = target !== null && mix ? target * mix.f : null;
      const kp2 = fcst ? kit / fcst * 100 : null;
      const fp2 = fcst ? foh / fcst * 100 : null;
      // Dept lines are informational too — no target verdict (Zak, 2026-07-17).
      const col = () => '';
      const kClosed = v === 'stow' && df2.food < 150;
      const kLine = kClosed
        ? `<b>Kitchen</b> closed${kit > 100 ? ' · but ' + fmtDollars(kit) + ' rostered' : ''}`
        : `<b>Kitchen</b> <span${col(kp2, kT)}>${kp2 !== null ? fmtPct(kp2) : '—'}</span> of total · ${fmtDollars(kit)}`;
      const fLine = `<b>FOH</b> <span${col(fp2, fT)}>${fp2 !== null ? fmtPct(fp2) : '—'}</span> of total · ${fmtDollars(foh)}`;
      dept = `<p class="wa-dept">${kLine}<br>${fLine}</p>`;
    }
  }
  // No per-day budget, target or cut-$X here any more (Zak, 2026-07-16: "the
  // daily wage budget is too noisy"). A day's budget was never a real decision
  // anyway — you don't balance the books on a Tuesday, you balance them over the
  // payroll week, and a quiet Tuesday against a shaped Tuesday target produced a
  // lot of red that meant nothing. The week total carries target vs roster; a
  // cell just shows what's on. The colour went too (2026-07-17) — same reason,
  // and because in the open week it flags salaried allocation artefacts as if
  // they were overspend.
  // The one exception is a MISSING dept — that's not budget noise, it's the
  // roster being unfinished, and it has to stay visible. Likewise a CLOSED day
  // with wages rostered on it stays red: that's a Deputy error, not a verdict.
  const gap = partial ? `<p class="wa-none">${D.missing.join(' + ')} not rostered yet</p>` : '';
  return `<div class="wa-cell ${cls}">${head}
    <p class="wa-pct">${pct !== null ? fmtPct(pct) : '—'}</p>
    <p class="wa-sub">${mode === 'actual' ? 'wages' : 'roster'} ${fmtDollars(wages)}<br>${mode === 'actual' ? 'took' : 'typical rev'} ${rev ? fmtDollars(rev) : '—'}</p>
    ${gap}
    ${dept}
  </div>`;
}

// Group view: one table answering "who made the money?" for the selected
// window. Rows link through to the venue tabs.
function renderVenueBreakdown() {
  const el = document.getElementById('venue-breakdown');
  if (!el) return;
  el.innerHTML = '';
  if (STATE.currentVenue !== 'group') return;
  const body = [['stow', 'Stowaway'], ['hg', 'Harry Gatos'], ['mari', "Marilyna's"]].map(([vk, lbl]) => {
    const rows = STATE.histories[vk] || [];
    let anchorDay = STATE.currentDay;
    if (!anchorDay && rows.length) anchorDay = rows[rows.length - 1].date;
    const day = rollup(rowsForTimeframe(rows, STATE.currentTimeframe, anchorDay));
    if (!day) return '';
    const rev = toNum(day.revenue_ex_gst);
    const yoy = yoyRevenueDelta(rows, STATE.currentTimeframe, anchorDay);
    const w = pnlWindow(day, vk);
    const a = actualCogs(vk, winEnd(day));
    const yoyCell = yoy !== null
      ? `<span class="${yoy >= 0 ? 'vb-pos' : 'vb-neg'}">${(yoy >= 0 ? '+' : '−') + Math.abs(yoy).toFixed(1)}%</span>` : '—';
    const profitCell = w
      ? `<span class="${w.profit >= 0 ? 'vb-pos' : 'vb-neg'}">${(w.profit < 0 ? '−$' : '$') + Math.round(Math.abs(w.profit)).toLocaleString()}</span>` : '—';
    return `<tr onclick="switchVenue('${vk}')">
      <td>${lbl}</td>
      <td>${fmtDollars(rev)}</td>
      <td>${yoyCell}</td>
      <td>${hasVal(day.wages_pct) ? fmtPct(toNum(day.wages_pct)) : '—'}</td>
      <td>${a ? fmtPct(a.pct) : hasVal(day.cogs_pct) ? fmtPct(toNum(day.cogs_pct)) : '—'}</td>
      <td>${profitCell}</td>
      <td>${w && w.rev ? fmtPct(w.profit / w.rev * 100) : '—'}</td>
    </tr>`;
  }).join('');
  if (!body) return;
  el.innerHTML = `<div style="overflow-x:auto;"><table class="vb-table">
    <thead><tr><th>Venue</th><th>Revenue</th><th>vs LY</th><th>Wages</th><th>COGS</th><th>Exp. profit</th><th>Margin</th></tr></thead>
    <tbody>${body}</tbody></table></div>`;
}

// Pipeline health: is every number on this page trustworthy right now?
function dhChip(lbl, cls, detail) {
  dhChip._cls.push(cls);
  dhChip._items.push({ lbl, cls, detail });
  return '';
}
function renderDataHealth() {
  const el = document.getElementById('data-health');
  if (!el) return;
  dhChip._cls = [];
  dhChip._items = [];
  const chips = [];
  const y = isoDate(addDays(sydneyToday(), -1));
  for (const [pk, lbl] of [['stow', 'Stow'], ['hg', 'HG'], ['mari', 'Mari']]) {
    const r = (STATE.histories[pk] || []).find(x => x.date === y);
    // Closed-day allowance: if this venue's typical take for that weekday is
    // ~nothing (HG is shut Tuesdays), an empty day is normal, not a failure.
    const typ = dowForecast(pk, new Date(y).getDay());
    if ((!r || !toNum(r.revenue_ex_gst)) && typ < 300) chips.push(dhChip(lbl, 'ok', 'closed ' + new Date(y).toLocaleDateString('en-AU', { weekday: 'long' }) + 's'));
    else if (!r || !toNum(r.revenue_ex_gst)) chips.push(dhChip(lbl, 'bad', 'no sales for yesterday yet'));
    else if (!hasVal(r.wages_dollars)) chips.push(dhChip(lbl, 'warn', 'sales in · wages pending approval (12:10pm re-pull)'));
    else chips.push(dhChip(lbl, 'ok', 'yesterday complete'));
  }
  const wks = [...new Set(STATE.xeroCogs.map(r => r.week_ending))].sort();
  if (wks.length) {
    const age = Math.floor((sydneyToday() - new Date(wks[wks.length - 1])) / 86400000);
    chips.push(dhChip('Xero purchases', age <= 13 ? 'ok' : 'warn', `to w/e ${wks[wks.length - 1]}` + (age > 13 ? ' — stale, check the Monday pull' : '')));
  } else chips.push(dhChip('Xero purchases', 'bad', 'feed missing'));
  const closed = closedMonthsSet();
  const curMonth = isoDate(sydneyToday()).slice(0, 7);
  const mos = STATE.xeroOH.map(r => r.month).filter(m => m && m < curMonth).sort();
  const missing = mos.filter(m => !closed.has(m));
  if (missing.length) chips.push(dhChip('Stock journals', 'warn', 'missing ' + missing.map(m => new Date(m + '-01').toLocaleDateString('en-AU', { month: 'short' })).join(', ') + ' — chase accounts; Actual Profit unlocks when posted'));
  else if (mos.length) chips.push(dhChip('Stock journals', 'ok', 'posted through ' + new Date(mos[mos.length - 1] + '-01').toLocaleDateString('en-AU', { month: 'short' })));
  if (STATE.roster && STATE.roster.generated) {
    const ageH = (Date.now() - new Date(STATE.roster.generated).getTime()) / 3600000;
    chips.push(dhChip('Roster feed', ageH < 26 ? 'ok' : 'warn', ageH < 26 ? 'fresh' : Math.round(ageH) + 'h old'));
  } else chips.push(dhChip('Roster feed', 'warn', 'not pulled yet — first run 6:45am'));
  const bad = dhChip._items.filter(i => i.cls !== 'ok');
  const dot = bad.some(i => i.cls === 'bad') ? '#E24B4A' : bad.length ? '#EF9F27' : '#1D9E75';
  const msg = bad.length
    ? bad.map(i => `<strong>${i.lbl}</strong> ${i.detail}`).join(' · ') + ' — everything else healthy'
    : 'All pipelines healthy — sales, wages, Xero purchases, stock journals, roster';
  el.innerHTML = `<p class="dh-line"><span class="dh-dot" style="background:${dot};"></span><span>${msg}</span></p>`;
}

let CHART_INSTANCE = null;
function renderChart() {
  const venueCfg = VENUE_CONFIG[STATE.currentVenue];
  const roleCfg = ROLE_CONFIG[CURRENT_ROLE] || ROLE_CONFIG.admin;
  const lines = ['revenue', ...(roleCfg.chart_lines || venueCfg.chart_lines)];
  const rows = STATE.histories[STATE.currentVenue] || [];
  let trailing, chartTitle;
  if (STATE.currentTimeframe === 'day') {
    trailing = rows.slice(-30);
    chartTitle = '30-Day Trailing';
  } else {
    let anchorDay = STATE.currentDay;
    if (!anchorDay && rows.length) anchorDay = rows[rows.length - 1].date;
    trailing = rowsForTimeframe(rows, STATE.currentTimeframe, anchorDay);
    if (trailing.length < 2) trailing = rows.slice(-30);
    chartTitle = 'Selected Period — Daily';
  }
  const titleEl = document.getElementById('trend-title');
  if (titleEl) titleEl.textContent = chartTitle;
  const ytEl = document.getElementById('year-toggles');
  if (ytEl && !(CURRENT_ROLE === 'admin' && STATE.focusMetric)) ytEl.style.display = 'none';
  const tickColor = IS_DARK ? '#B7B1A4' : '#5A544C';
  const gridColor = IS_DARK ? 'rgba(120,110,90,0.2)' : 'rgba(232,223,207,0.4)';
  const ctx = document.getElementById('trend-chart').getContext('2d');
  if (CHART_INSTANCE) CHART_INSTANCE.destroy();
  if (CURRENT_ROLE === 'admin') {
    const endIso = trailing.length ? trailing[trailing.length - 1].date : isoDate(sydneyToday());
    const dfr = deliveryFeesPct(STATE.currentVenue, endIso);
    const ohA = overheadsDailyRate(STATE.currentVenue, endIso);
    const ohDaily = ohA ? ohA.rate : (OVERHEADS_WEEKLY[STATE.currentVenue] || 0) / 7;
    const cpDaily = corpPayrollDaily(STATE.currentVenue, endIso);
    const dailyBins = trailing.length <= 45;
    const bins = {};
    for (const r of trailing) {
      const key = dailyBins ? r.date : isoDate(weekStart(new Date(r.date)));
      const b = bins[key] = bins[key] || { rev: 0, cogs: 0, wages: 0, days: 0, wageDays: 0, drv: 0 };
      b.rev += toNum(r.revenue_ex_gst); b.cogs += toNum(r.cogs_dollars);
      if (hasVal(r.wages_dollars)) { b.wages += toNum(r.wages_dollars); b.wageDays += 1; }
      b.drv += toNum(r.delivery_dollars);
      b.days += 1;
    }
    const keys = Object.keys(bins).sort();

    if (STATE.focusMetric) {
      const sh = dowShares(STATE.currentVenue);
      const ocr = STATE.oncost.rate || 0;   // payroll tax + WC, on this bin's wages
      const ohOf = (k, B = bins) => (dailyBins && sh ? ohDaily * 7 * sh[new Date(k).getDay()] : ohDaily * B[k].days) + ocr * B[k].wages;
      const t = STATE.baselines[STATE.currentVenue] || {};
      const a = actualCogs(STATE.currentVenue, endIso);
      const FOCUS = {
        revenue:       { label: 'Revenue $', unit: '$', target: null,
                         fn: (k, B = bins) => B[k].rev },
        wages_hero:    { label: 'Wages %', unit: '%', target: WAGE_TARGET_PCT,
                         fn: (k, B = bins) => B[k].wageDays && B[k].rev ? B[k].wages / B[k].rev * 100 : null },
        cogs_merged:   { label: 'Expected COGS % (Lightspeed)', unit: '%', target: COGS_TARGET_PCT,
                         fn: (k, B = bins) => B[k].rev ? B[k].cogs / B[k].rev * 100 : null },
        delivery_fees: { label: 'Delivery %', unit: '%', target: t.delivery && t.delivery.target,
                         fn: (k, B = bins) => B[k].rev ? (B[k].drv + (dfr ? B[k].rev * dfr.pct / 100 : 0)) / B[k].rev * 100 : null },
        overheads:     { label: 'Overheads %', unit: '%', target: null,
                         fn: (k, B = bins) => B[k].rev ? ohOf(k, B) / B[k].rev * 100 : null },
        profit:        { label: 'Expected profit $', unit: '$', target: null,
                         fn: (k, B = bins) => {
                           if (!B[k].wageDays) return null;
                           const cogsPct = a ? a.pct : (B[k].rev ? B[k].cogs / B[k].rev * 100 : 0);
                           return B[k].rev - B[k].rev * cogsPct / 100 - B[k].wages - ohOf(k, B)
                                  - (dfr ? B[k].rev * dfr.pct / 100 : 0) - (dailyBins && sh ? cpDaily * 7 * sh[new Date(k).getDay()] : cpDaily * B[k].days);
                         } },
      };
      const def = FOCUS[STATE.focusMetric];
      if (def) {
        const series = keys.map(k => def.fn(k));
        const vals = series.filter(x => x !== null && isFinite(x));
        const avg = vals.length ? vals.reduce((x, y) => x + y, 0) / vals.length : null;
        const fmtTick = def.unit === '$' ? (v => '$' + (Math.abs(v) >= 1000 ? (v / 1000).toFixed(0) + 'k' : v)) : (v => v + '%');
        const sets = [
          { label: def.label, data: series.map(x => x === null ? null : Math.round(x * 10) / 10), borderColor: '#378ADD', backgroundColor: '#378ADD20', borderWidth: 2.5, pointRadius: keys.length > 45 ? 0 : 3, pointBackgroundColor: '#378ADD', tension: 0.25, spanGaps: true },
        ];
        if (avg !== null) sets.push({ label: 'Period average', data: keys.map(() => Math.round(avg * 10) / 10), borderColor: tickColor, borderDash: [6, 5], borderWidth: 1.5, pointRadius: 0 });
        if (def.target != null) sets.push({ label: 'Target', data: keys.map(() => def.target), borderColor: '#1D9E75', borderDash: [2, 4], borderWidth: 2, pointRadius: 0 });
        if (STATE.focusMetric === 'revenue') {
          const bp = breakevenParts(STATE.currentVenue, endIso);
          if (bp) {
            const beOf = k => (dailyBins && sh ? bp.fixedDaily * 7 * sh[new Date(k).getDay()] : bp.fixedDaily * bins[k].days) / (1 - bp.varPct / 100);
            sets.push({ label: 'Breakeven', data: keys.map(k => Math.round(beOf(k))), borderColor: '#E24B4A', borderDash: [3, 4], borderWidth: 1.8, pointRadius: 0 });
          }
        }
        // ---- prior-year overlays: same window shifted -364n days (weekday-
        // aligned), binned onto the SAME axis keys. Rate inputs (Xero fees,
        // OH, corp payroll) stay at today's rates — like-for-like at the
        // current cost structure.
        const ytEl2 = document.getElementById('year-toggles');
        const histMin = rows.length ? rows[0].date : '9999-12-31';
        const endYear = new Date(endIso).getFullYear();
        const avail = [];
        for (let n = 1; n <= 4; n++) {
          if (isoDate(addDays(new Date(endIso), -364 * n)) >= histMin) avail.push(n);
        }
        STATE.focusYears = STATE.focusYears.filter(n => avail.includes(n));
        if (ytEl2) {
          ytEl2.style.display = avail.length ? 'flex' : 'none';
          ytEl2.innerHTML = '<span class="yt-label">Compare:</span>' + avail.map(n =>
            `<button class="yt-btn${STATE.focusYears.includes(n) ? ' active' : ''}" onclick="toggleYear(${n})">${endYear - n}</button>`).join('');
        }
        const YCOLORS = { 1: '#E8A82B', 2: '#D4537E', 3: '#5DCAA5', 4: '#B4B2A9' };
        for (const n of STATE.focusYears) {
          const s2 = isoDate(addDays(new Date(keys[0]), -364 * n));
          const e2 = isoDate(addDays(new Date(endIso), -364 * n));
          const B2 = {};
          for (const r of rows) {
            if (r.date < s2 || r.date > e2) continue;
            const mapped = dailyBins ? isoDate(addDays(new Date(r.date), 364 * n)) : isoDate(addDays(weekStart(new Date(r.date)), 364 * n));
            const b = B2[mapped] = B2[mapped] || { rev: 0, cogs: 0, wages: 0, days: 0, wageDays: 0, drv: 0 };
            b.rev += toNum(r.revenue_ex_gst); b.cogs += toNum(r.cogs_dollars);
            if (hasVal(r.wages_dollars)) { b.wages += toNum(r.wages_dollars); b.wageDays += 1; }
            b.drv += toNum(r.delivery_dollars); b.days += 1;
          }
          const data2 = keys.map(k => B2[k] ? def.fn(k, B2) : null);
          sets.push({ label: String(endYear - n), data: data2.map(x => x === null ? null : Math.round(x * 10) / 10),
            borderColor: YCOLORS[n], backgroundColor: YCOLORS[n] + '20', borderWidth: 1.8, pointRadius: 0, tension: 0.25, spanGaps: true });
        }
        if (titleEl) titleEl.textContent = def.label + ' \u2014 ' + (dailyBins ? 'daily' : 'weekly') + ' \u00b7 click the card again to return';
        CHART_INSTANCE = new Chart(ctx, {
          type: 'line',
          data: { labels: keys.map(k => k.slice(5)), datasets: sets },
          options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
              y: { ticks: { callback: fmtTick, font: { family: 'Inter', size: 11 }, color: tickColor }, grid: { color: gridColor } },
              x: { ticks: { font: { family: 'Inter', size: 11 }, color: tickColor, maxTicksLimit: 16 }, grid: { display: false } }
            },
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 14, boxHeight: 3, usePointStyle: true, pointStyle: 'line', font: { family: 'Space Grotesk', size: 12, weight: '500' }, color: tickColor, padding: 16 } } }
          }
        });
        return;
      }
    }
    const shc = dowShares(STATE.currentVenue);
    const cogsArr = keys.map(k => Math.round(bins[k].cogs));
    const wageArr = keys.map(k => Math.round(bins[k].wages));
    const delvArr = keys.map(k => Math.round(dfr ? bins[k].rev * dfr.pct / 100 : 0));
    const cpArr = keys.map(k => Math.round(dailyBins && shc ? cpDaily * 7 * shc[new Date(k).getDay()] : cpDaily * bins[k].days));
    const ohArr = keys.map(k => Math.round(dailyBins && shc ? ohDaily * 7 * shc[new Date(k).getDay()] : ohDaily * bins[k].days));
    const revArr = keys.map(k => Math.round(bins[k].rev));
    const profArr = keys.map((k, i) => bins[k].wageDays ? revArr[i] - cogsArr[i] - wageArr[i] - delvArr[i] - cpArr[i] - ohArr[i] : null);
    const mk = (label, color, data) => ({ type: 'bar', label, stack: 'costs', backgroundColor: color, borderWidth: 0, data });
    const stackSets = [
      mk('COGS', '#D85A30', cogsArr),
      mk('Wages', '#7F77DD', wageArr),
      mk('Delivery', '#EF9F27', delvArr),
      mk('Corp payroll', '#D4537E', cpArr),
      mk('Overheads', '#888780', ohArr),
      { type: 'line', label: 'Revenue', data: revArr, borderColor: '#378ADD', backgroundColor: '#378ADD20', borderWidth: 2.5, pointRadius: keys.length > 45 ? 0 : 3, pointBackgroundColor: '#378ADD', tension: 0.25 },
    ];
    if (titleEl) titleEl.textContent = (dailyBins ? 'Daily' : 'Weekly') + ' costs stacked vs revenue \u2014 the gap is profit';
    CHART_INSTANCE = new Chart(ctx, {
      data: { labels: keys.map(k => k.slice(5)), datasets: stackSets },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          y: { stacked: true, ticks: { callback: v => '$' + (v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v), font: { family: 'Inter', size: 11 }, color: tickColor }, grid: { color: gridColor } },
          x: { stacked: true, ticks: { font: { family: 'Inter', size: 11 }, color: tickColor, maxTicksLimit: 16 }, grid: { display: false } }
        },
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 14, boxHeight: 8, font: { family: 'Space Grotesk', size: 12, weight: '500' }, color: tickColor, padding: 16 } } }
      }
    });
    return;
  }
  const datasets = lines.map(line => {
    const def = CHART_LINE_DEFS[line];
    return { label: def.label, yAxisID: def.axis || 'y', data: trailing.map(r => hasVal(r[def.key]) ? toNum(r[def.key]) : null), borderColor: def.color, backgroundColor: def.color + '20', tension: 0.3, borderWidth: 2.5, pointRadius: trailing.length > 45 ? 0 : 3, pointBackgroundColor: def.color, spanGaps: true };
  });
  CHART_INSTANCE = new Chart(ctx, {
    type: 'line',
    data: { labels: trailing.map(r => r.date.slice(5)), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { ticks: { callback: v => v + '%', font: { family: 'Inter', size: 11 }, color: tickColor }, grid: { color: gridColor } },
        y2: { position: 'right', ticks: { callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v), font: { family: 'Inter', size: 11 }, color: '#3A7BD5' }, grid: { display: false } },
        x: { ticks: { font: { family: 'Inter', size: 11 }, color: tickColor, maxTicksLimit: 16 }, grid: { display: false } }
      },
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 14, boxHeight: 3, usePointStyle: true, pointStyle: 'line', font: { family: 'Space Grotesk', size: 12, weight: '500' }, color: tickColor, padding: 20 } } }
    }
  });
}

async function fetchLastUpdate() {
  const rows = STATE.histories[STATE.currentVenue] || [];
  if (!rows.length) { document.getElementById('last-update').textContent = 'unknown'; return; }
  const latest = rows[rows.length - 1];
  const cfg = VENUE_CONFIG[STATE.currentVenue];
  if (!cfg.dayFilePrefix) {
    const stamps = [];
    for (const v of REAL_VENUES) {
      const rrows = STATE.histories[v] || [];
      if (!rrows.length) continue;
      try {
        const r = await fetch(`${VENUE_CONFIG[v].dayFilePrefix}${rrows[rrows.length-1].date}.json?t=` + Date.now());
        const data = await r.json();
        stamps.push(new Date(data.generated_at).getTime());
      } catch (e) {}
    }
    if (stamps.length) document.getElementById('last-update').textContent = new Date(Math.max(...stamps)).toLocaleString('en-AU');
    else document.getElementById('last-update').textContent = 'unknown';
    return;
  }
  try {
    const r = await fetch(`${cfg.dayFilePrefix}${latest.date}.json?t=` + Date.now());
    const data = await r.json();
    document.getElementById('last-update').textContent = new Date(data.generated_at).toLocaleString('en-AU');
  } catch (e) {
    document.getElementById('last-update').textContent = 'unknown';
  }
}

// Show the switch on group only, and say what it's worth for the window in
// view — a checkbox that silently moves a headline number is worse than no
// checkbox. The $ is the admin+leave actually in scope, not a global constant.
function renderOverheadToggle() {
  const wrap = document.getElementById('oh-toggle-wrap');
  if (!wrap) return;
  const isGroup = STATE.currentVenue === 'group';
  wrap.style.display = isGroup ? 'flex' : 'none';
  if (!isGroup) return;
  const box = document.getElementById('oh-toggle');
  if (box) box.checked = STATE.inclOverhead;
  let oh = 0;
  for (const v of REAL_VENUES) {
    for (const r of rowsForTimeframe(STATE.histories[v] || [], STATE.currentTimeframe, STATE.currentDay)) {
      oh += toNum(r.wages_admin_dollars) + toNum(r.leave_dollars);
    }
  }
  const note = document.getElementById('oh-note');
  if (note) note.textContent = oh
    ? `${STATE.inclOverhead ? 'including' : 'excluding'} ${fmtDollars(oh)} — not rostered against trade`
    : 'no admin or leave in this window';
}

function render() {
  renderVenueTabs();
  renderVenueStrip();
  renderOverheadToggle();
  renderTimeframeToggle();
  renderDayPicker();
  renderSnapshot();
  renderChart();
  fetchLastUpdate();
}

function focusMetric(key) {
  STATE.focusMetric = STATE.focusMetric === key ? null : key;
  STATE.focusYears = [];
  render();
}
function toggleYear(n) {
  const i = STATE.focusYears.indexOf(n);
  if (i >= 0) STATE.focusYears.splice(i, 1); else STATE.focusYears.push(n);
  render();
}
function switchVenue(venue) {
  STATE.currentVenue = venue;
  STATE.focusMetric = null;
  const rows = STATE.histories[venue] || [];
  STATE.currentDay = rows.length ? rows[rows.length - 1].date : null;
  render();
}
// Group only. Venue views never include admin/leave — there's nothing to toggle:
// no venue decision moves them, so offering the switch there would only invite
// the question "which of these two numbers is my wage bill?".
// The group rows are SYNTHESISED from the venue rows, so flipping this has to
// rebuild them — nothing is cached from the raw CSVs.
function toggleOverhead() {
  STATE.inclOverhead = !STATE.inclOverhead;
  STATE.histories.group = synthesizeGroupHistory(STATE.histories);
  render();
}
function switchTimeframe(tf) {
  STATE.currentTimeframe = tf;
  if (tf !== 'day') {
    const rows = STATE.histories[STATE.currentVenue] || [];
    if (rows.length) STATE.currentDay = rows[rows.length - 1].date;
  }
  if (tf === 'range' && !STATE.rangeStart) {
    const rows = STATE.histories[STATE.currentVenue] || [];
    if (rows.length) {
      STATE.rangeStart = rows[Math.max(0, rows.length - 28)].date;
      STATE.rangeEnd = rows[rows.length - 1].date;
    }
  }
  render();
}
function switchDay(iso) {
  STATE.currentDay = iso;
  render();
}
async function bootstrap() {
  const roleCfg = ROLE_CONFIG[CURRENT_ROLE] || ROLE_CONFIG.admin;
  STATE.histories = await loadAllHistories(CURRENT_ROLE);
  // Roster forecast is OPERATIONAL — every role gets the week-ahead view.
  try {
    const r = await fetch('data/roster_week.json?t=' + Date.now());
    if (r.ok) STATE.roster = await r.json();
  } catch (e) {}
  // Economic feeds are ADMIN-ONLY (Zak, 2026-07-15: only admin sees overheads
  // and profit) — manager roles never download Xero/fee data at all.
  if (CURRENT_ROLE === 'admin') {
    try {
      const r = await fetch('data/xero_cogs_weekly.csv?t=' + Date.now());
      if (r.ok) STATE.xeroCogs = parseCsv(await r.text());
    } catch (e) {}
    try {
      const r = await fetch('data/xero_overheads_monthly.csv?t=' + Date.now());
      if (r.ok) STATE.xeroOH = parseCsv(await r.text());
    } catch (e) {}
    try {
      // Wage on-costs: owner salary (-> corp payroll) + payroll-tax/WC rate
      // (-> overheads, as a % of wages). Built by compute_wage_oncosts.py.
      const r = await fetch('data/wage_oncosts.json?t=' + Date.now());
      if (r.ok) {
        const o = await r.json();
        STATE.oncost = { rate: toNum(o.oncost_rate), ownerWeekly: toNum(o.owner_weekly_inc_super) };
      }
    } catch (e) {}
    try {
      const r = await fetch('data/uber_fees_weekly.csv?t=' + Date.now());
      if (r.ok) STATE.uberFees = parseCsv(await r.text());
    } catch (e) {}
    for (const [v, f] of [['mari', 'mari_baseline.json'], ['stow', 'stow_baseline.json'], ['hg', 'hg_baseline.json']]) {
      try {
        const r = await fetch('baselines/' + f + '?t=' + Date.now());
        if (r.ok) STATE.baselines[v] = (await r.json()).targets_and_alerts || {};
      } catch (e) {}
    }
  }
  const defaultVenue = roleCfg.defaultVenue;
  const withData = roleCfg.venues.find(v => (STATE.histories[v] || []).length > 0);
  STATE.currentVenue = (STATE.histories[defaultVenue]?.length ? defaultVenue : withData) || defaultVenue;
  const rows = STATE.histories[STATE.currentVenue] || [];
  STATE.currentDay = rows.length ? rows[rows.length - 1].date : isoDate(addDays(sydneyToday(), -1));
  document.querySelectorAll('#timeframe-toggle button').forEach(btn => {
    btn.onclick = () => switchTimeframe(btn.dataset.tf);
  });
  const more = document.getElementById('tf-more');
  if (more) more.onchange = () => { if (more.value) switchTimeframe(more.value); };
  document.getElementById('range-apply').onclick = applyRange;
  render();
}

tryResume().catch(e => console.error(e));
</script>
