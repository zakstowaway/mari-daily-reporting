<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stowaway Hospitality Group</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/_shared/tokens.css?v=20260719b">
<!--
  The app home. Sign in ONCE here (Supabase), then pick a tool. This is the
  front door: login lives at /, not on any one tool page. Each tool (/sales/,
  /recipes/) shares this session — one login for everything.
-->
<style>
  .home{max-width:920px;margin:0 auto;padding:40px 24px}
  .hero{margin-bottom:30px}
  .hero h1{font-size:30px;letter-spacing:-.02em}
  .hero .who{color:var(--ink-soft);font-size:14px;margin-top:6px}
  .hero .who b{color:var(--ink);font-weight:600}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
  .tile{display:flex;flex-direction:column;text-decoration:none;color:inherit;background:var(--paper);
    border:1px solid var(--line);border-radius:14px;padding:22px;border-top:4px solid var(--grey);
    box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s,border-color .12s;min-height:118px}
  .tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
  .tile.stow{border-top-color:var(--stow)} .tile.hg{border-top-color:var(--hg)}
  .tile.mari{border-top-color:var(--mari)}
  .tile h2{font-family:'Space Grotesk',sans-serif;font-size:17px;margin:0 0 7px}
  .tile p{margin:0;font-size:13px;color:var(--ink-soft);line-height:1.5}
  .tile .locked{font-size:11.5px;color:var(--amber);margin-top:auto;padding-top:10px}
  .arrow{margin-top:auto;padding-top:12px;font-family:'Space Grotesk',sans-serif;font-size:12px;
    font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft)}
  .app-header{border-bottom:1px solid var(--line);background:var(--paper)}
  .app-header-inner{max-width:920px;margin:0 auto;padding:14px 24px;display:flex;
    align-items:center;justify-content:space-between;gap:16px}
  .brand-row{display:flex;align-items:center;gap:11px;text-decoration:none;color:inherit}
  .brand-row img{height:34px;width:auto;display:block}
  .group-brand{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;
    letter-spacing:-.01em;color:var(--ink)}
  .app-header .who{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft);margin:0}
  .app-header .who a{color:var(--ink);text-decoration:none}
  .app-header .who a:hover{text-decoration:underline}
</style>
</head>
<body>
<div id="gate"></div>
<div id="app" style="display:none">
  <header class="app-header"><div class="app-header-inner">
    <a class="brand-row" href="/"><img src="/logo_512.png" alt=""><span class="group-brand">Stowaway Hospitality Group</span></a>
    <div class="who"><span id="whotop"></span><a href="#" id="signout">sign out</a></div>
  </div></header>
  <div class="home">
    <div class="hero">
      <h1>Welcome back</h1>
      <div class="who" id="who"></div>
    </div>
    <div class="tiles" id="tiles"></div>
  </div>
</div>

<script type="module">
import { Auth } from '/_shared/auth.js';

const TOOLS = [
  { href: '/sales/',   cls: 'stow', title: 'Daily Reporting',
    desc: 'Sales, wages, COGS and margins across all three venues.',
    roles: null },   // everyone signed in
  { href: '/recipes/', cls: 'hg',   title: 'Recipe Builder',
    desc: 'Cost a dish from what you actually bought. Build the COGS database.',
    roles: Auth.KITCHEN_ROLES },
  { href: '/bookings/', cls: 'stow', title: 'Bookings',
    desc: 'Event bookings on the seating engine: day view, edits, runsheets.',
    roles: ['admin'] },
  { href: '/admin/',   cls: 'mari', title: 'Team',
    desc: 'Invite people and set what they can do.',
    roles: ['admin'] },
];

Auth.gate(document.getElementById('gate'), {
  roles: null,               // any signed-in user reaches the home
  onOk: (user) => {
    document.getElementById('app').style.display = '';
    document.getElementById('whotop').innerHTML = `<strong>${user.name}</strong>`;
    document.getElementById('who').innerHTML =
      `Signed in as <b>${user.name}</b>` + (user.role ? ` · ${user.role}` : ' · no role yet');
    document.getElementById('signout').onclick = async (e) => {
      e.preventDefault(); await Auth.logout(); location.reload();
    };
    const tiles = TOOLS.map(t => {
      const allowed = !t.roles || (user.role && t.roles.includes(user.role));
      return `<a class="tile ${t.cls}" href="${allowed ? t.href : '#'}"
                 ${allowed ? '' : 'onclick="return false" style="opacity:.55;cursor:default"'}>
        <h2>${t.title}</h2><p>${t.desc}</p>
        ${allowed ? '<div class="arrow">Open →</div>'
                  : '<div class="locked">🔒 Needs a kitchen role — ask an admin.</div>'}
      </a>`;
    }).join('');
    document.getElementById('tiles').innerHTML = tiles;
  },
});
</script>
</body>
</html>
