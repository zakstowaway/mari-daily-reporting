<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team · Stowaway Hospitality Group</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/_shared/tokens.css?v=20260719b">
<!--
  Admin: invite people and set what they can do. Admin-only.

  All privileged actions go to the Pipedream worker, which verifies you're an
  admin (from your Supabase token) and then uses the service key server-side.
  The service key never reaches this page. See modules/auth/pipedream/.
-->
<style>
  .wrap{max-width:1040px}
  .row{display:grid;grid-template-columns:1fr 120px 120px 160px 130px;gap:8px;align-items:center;
       padding:9px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;background:var(--paper)}
  .row .who{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .who small{display:block;color:var(--ink-soft);font-size:11px}
  select,input{padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink);width:100%}
  .invite{display:grid;grid-template-columns:1fr 130px 130px 160px auto;gap:8px;align-items:end}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin:0 0 4px}
  .muted{color:var(--ink-soft);font-size:12px}
  .hd{display:flex;justify-content:space-between;align-items:baseline;margin:22px 0 8px}
  .hd h2{font-size:15px;margin:0}
  .pill{font-size:11px;padding:1px 7px;border-radius:99px;background:var(--grey);color:#fff}
  .pill.set{background:var(--green)} .pill.none{background:var(--amber)}
  .msg{font-size:13px;margin-top:8px;min-height:18px}
</style>
</head>
<body>
<div id="gate"></div>
<div id="app" style="display:none">
  <header class="app-header"><div class="app-header-inner">
    <a class="brand-row" href="/"><img src="/logo_512.png" alt=""><span class="group-brand">Stowaway Hospitality Group</span></a>
    <div class="who"><span id="who"></span><a href="/">home</a></div>
  </div></header>
  <div class="wrap">
  <h1>Team</h1>
  <p class="sub">Invite people, set what each can do, and link them to their
    Deputy record so prep time is costed at their real rate. Chefs need a kitchen
    role before they can save recipes.</p>

  <div class="card">
    <div class="hd"><h2>Invite someone</h2></div>
    <div class="invite">
      <div><label>Email</label><input id="inv-email" type="email" placeholder="name@stowawaybar.com"></div>
      <div><label>Role</label><select id="inv-role"></select></div>
      <div><label>Venue</label><select id="inv-venue"></select></div>
      <div><label>Employee</label><select id="inv-emp"></select></div>
      <div><button id="inv-btn" onclick="doInvite()">Send invite</button></div>
    </div>
    <div class="msg" id="inv-msg"></div>
  </div>

  <div class="hd"><h2>People</h2><span class="muted" id="count"></span></div>
  <div id="list"><div class="muted">Loading…</div></div>
  <div class="msg" id="list-msg"></div>
  </div>
</div>

<script type="module">
import { Auth } from '/_shared/auth.js';

const ROLES  = ['admin','bigchef','stowfood','hgfood','bar','pizza'];
const VENUES = ['stowaway','harry_gatos','marilynas'];
let EMPLOYEES = [];   // {id,name} from data/employees.json — links login -> wage
const roleOpts  = (sel) => ['<option value="">— no access —</option>']
  .concat(ROLES.map(r=>`<option ${r===sel?'selected':''}>${r}</option>`)).join('');
const venueOpts = (sel) => ['<option value="">any / all</option>']
  .concat(VENUES.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`)).join('');
const empOpts = (sel) => ['<option value="">— not linked —</option>']
  .concat(EMPLOYEES.map(e=>`<option value="${e.id}" ${String(e.id)===String(sel)?'selected':''}>${e.name}</option>`)).join('');

Auth.gate(document.getElementById('gate'), {
  roles: ['admin'],   // this page is admins only
  onOk: async (user) => {
    document.getElementById('app').style.display = '';
    document.getElementById('who').textContent = user.name;
    try {
      const r = await fetch('/data/employees.json');
      EMPLOYEES = (await r.json()).employees || [];
    } catch { EMPLOYEES = []; }
    document.getElementById('inv-role').innerHTML = roleOpts('stowfood');
    document.getElementById('inv-venue').innerHTML = venueOpts('');
    document.getElementById('inv-emp').innerHTML = empOpts('');
    load();
  },
});

async function load() {
  const el = document.getElementById('list');
  try {
    const users = await Auth.listUsers();
    document.getElementById('count').textContent = `${users.length} people`;
    el.innerHTML = users.sort((a,b)=>(a.email>b.email?1:-1)).map(u => `
      <div class="row">
        <div class="who">${u.name || u.email}<small>${u.email}
          ${u.confirmed ? '' : '· not confirmed yet'}</small></div>
        <select data-email="${u.email}" class="r">${roleOpts(u.role)}</select>
        <select data-email="${u.email}" class="v">${venueOpts(u.venue)}</select>
        <select data-email="${u.email}" class="e" title="Deputy employee — sets the wage rate their prep is costed at">${empOpts(u.employee)}</select>
        <div style="text-align:right">
          <span class="pill ${u.role?'set':'none'}">${u.role || 'no role'}</span>
          <button class="ghost save" data-email="${u.email}" style="margin-left:6px">Save</button>
        </div>
      </div>`).join('');
    el.querySelectorAll('.save').forEach(b => b.onclick = () => saveRole(b.dataset.email));
  } catch (e) {
    document.getElementById('list-msg').innerHTML =
      `<span style="color:var(--red)">Couldn't load: ${e.message}. (Is SUPABASE_SERVICE_KEY set on the worker?)</span>`;
  }
}

async function saveRole(email) {
  const msg = document.getElementById('list-msg');
  const role  = document.querySelector(`.r[data-email="${CSS.escape(email)}"]`).value || null;
  const venue = document.querySelector(`.v[data-email="${CSS.escape(email)}"]`).value || null;
  const emp   = document.querySelector(`.e[data-email="${CSS.escape(email)}"]`).value || null;
  msg.textContent = 'Saving…';
  try {
    await Auth.setUserRole(email, role, venue, emp);
    msg.innerHTML = `<span style="color:var(--green)">${email}: ${role || 'access removed'}${venue?` · ${venue}`:''}. They pick it up on next sign-in.</span>`;
    load();
  } catch (e) { msg.innerHTML = `<span style="color:var(--red)">${e.message}</span>`; }
}

window.doInvite = async () => {
  const msg = document.getElementById('inv-msg');
  const email = document.getElementById('inv-email').value.trim();
  const role  = document.getElementById('inv-role').value || null;
  const venue = document.getElementById('inv-venue').value || null;
  const emp   = document.getElementById('inv-emp').value || null;
  if (!email) { msg.textContent = 'Enter an email.'; return; }
  const btn = document.getElementById('inv-btn'); btn.disabled = true; btn.textContent = 'Sending…';
  try {
    await Auth.inviteUser(email, role, venue, emp);
    msg.innerHTML = `<span style="color:var(--green)">Invite emailed to ${email}${role?` as ${role}`:''}. They set their own password.</span>`;
    document.getElementById('inv-email').value = '';
    load();
  } catch (e) { msg.innerHTML = `<span style="color:var(--red)">${e.message}</span>`; }
  finally { btn.disabled = false; btn.textContent = 'Send invite'; }
};
</script>
</body>
</html>
