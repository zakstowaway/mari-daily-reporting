      # AMOUNTS ARE EX-GST. DEXT'S LINE ITEMS ARE EX-GST. HEADER IS INCL-GST.
      # =================================================================
      # VERIFIED inv SI4467596 (16 Jul 2026, Stowaway):
      #   columns read "Price Excl. GST" / "Amount Excl. GST"
      #   footer:  Total AUD Excl. GST   264.60
      #            GST Amount              4.60
