      # "missing" $4.60 is simply the GST.
      #
      # Lightspeed needs GST-INCLUSIVE costs (Rule 2). Taking Dext's line
      # amounts straight in understates every TAXABLE line by 10%.
      line_amounts_are_ex_gst: true
      dext_lineitems_are_ex_gst: true
      dext_header_is_incl_gst: true

      # Tax is PER LINE, flagged in a dedicated "GST" column.
