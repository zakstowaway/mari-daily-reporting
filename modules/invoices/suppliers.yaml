  be_foods:
    display_name: "B&E Foods"
    aliases: ["B&E Foods", "B & E Foods", "BE Foods"]
    default_tax: gst_free      # basic food — most lines GST-free
    # CORRECTED 16 Jul 2026. Appendix B says "never has, never will".
    # That was TRUE WHEN WRITTEN and is now stale:
    #   first invoice        2026-03-03  (new supplier)
    #   first WITH lineitems 2026-05-12  (Dext trained the template, silently)
    #   still MISSING on     2026-07-01
    #   coverage             19/40 sampled — INTERMITTENT, not a clean switch
    # Never rely on presence. Always be able to fall back to the PDF.
    dext_line_items: intermittent
    dext_line_items_since: "2026-05-12"
    columns: ["Item Code", "Item Description", "Ordered", "Shipped", "UOM",
              "Ship Doc + Unit UOM", "Item Price", "GST", "Line Total"]
    multi_page: true          # inv 6969915 is "Page 1 of 2"
    quirks:
      # =================================================================
      # QTY IS IN UOM UNITS, AND UOM VARIES PER LINE. NEVER READ IT AS A COUNT.
      # =================================================================
      # VERIFIED inv 6969915 (16 Jul 2026):
      #   CHICKEN BREAST (F) SLICE 5MM PREMIUM 5KG BAG
      #     Ordered 5.00 | Shipped 5.00 | UOM KG | Ship Doc 1.00 BAG
      #     Item Price $12.20 | Line Total $61.00
      #
      #   -> That is ONE 5kg bag. The "5.00" is KILOGRAMS.
      #   -> Read it as a count and you book 5 bags / 25kg of chicken that was
      #      never delivered. 5x stock, 5x COGS, silent, looks normal.
      #
      # One invoice carried UOM = UNIT, KG, BAG and TUB. There is no single
      # reading of the qty column. `Ship Doc + Unit UOM` carries the actual
      # physical pack count (e.g. "1.00 BAG").
      qty_is_in_uom_units: true
      uom_varies_per_line: true
      uom_values_seen: ["UNIT", "KG", "BAG", "TUB"]
      pack_count_column: "Ship Doc + Unit UOM"
      # Ordered vs Shipped are SEPARATE. Receive SHIPPED, never ORDERED.
      has_ordered_and_shipped_columns: true
      receive_column: "Shipped"
      # Per-KG -> per-unit: cost = invoice_KG_price * pack_weight_kg
      #   Beef Brisket Diced [5kg]   $13.50/KG -> $67.50
      #   Chicken Breast Slice [5KG] $9.90/KG  -> $49.50
      #   Spanish Chorizo [1kg]      $22.70/KG -> $22.70
      # Bracket "[kg]" with NO number = tracked per kg, do NOT multiply.
      per_kg_conversion: true
      pack_weight_from_name_bracket: true
      # Per-CTN -> per-unit: divide by units per carton, count in parentheses.
      #   "2KG(3)"     -> / 3
      #   "1.5KGx6"    -> / 6
      #   "5X3KG CTN"  -> / 5
      # Worked: Sweet Potato Chips [1.5KG] $83.00/CTN "1.5KGx6" -> $13.83
      per_ctn_conversion: true
      # CONFIRMED on inv 6969915 — the (N) in the description IS units/carton,
      # cross-checked against the Ship Doc column:
      #   "ANCHOVY FILLETS 690G(12)"   -> 0.08 CTN   (1/12 = 0.083 ✓)
      #   "CHORIZO 1KG (15)"           -> 0.07 CTN   (1/15 = 0.067 ✓)
      #   "ANTIPASTO 2KG TUB (4)"      -> 0.25 CTN   (1/4  = 0.25  ✓)
      ctn_count_patterns:
        - "\\((\\d+)\\)"          # 2KG(3), 690G(12), 1KG (15)
        - "[xX](\\d+)\\s*$"       # 1.5KGx6
        - "^(\\d+)\\s*[xX]"       # 5X3KG CTN

      # CAUTION — do NOT double-apply the per-KG rule.
      # Appendix B: "cost_price = invoice_KG_price x pack_weight_kg".
      # True, but the invoice ALREADY did it: Chicken Breast $12.20/KG x 5kg
      # = $61.00 = the stated Line Total. Multiplying a Line Total that already
      # reflects the weight double-counts.
      # SAFE RULE: Line Total is authoritative.
      #            units = Shipped / pack_weight_kg;  unit_cost = LineTotal / units
      line_total_is_authoritative: true

