    columns: ["PRODUCT CODE", "DESCRIPTION", "QUANTITY", "UNIT PRICE", "GST", "AMOUNT"]
    # VERIFIED inv CI-424608 (13 Jul 2026, Stowaway). Cleanest layout seen.
    #   MANFLOPIZ-U        Pizza Flour 12.5kg      5.000 Unit  13.80000   0%  $ 69.00
    #   PBLTB13-U          Pizza Boxes x 50        2.000 Unit  29.21000  10%  $ 58.42
