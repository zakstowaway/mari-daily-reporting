    #   DELIVERY_007       Standard Delivery       1.000 Unit   0.00000  10%  $  0.00
    #     Untaxed Amount 346.42 | GST 0% on 288.00 = 0.00 | GST 10% on 58.42 = 5.84
    #     Total 352.26
    # All checks: 69+58.42+210+9 = 346.42 ✓ ; 58.42 x 10% = 5.84 ✓ ; sum = 352.26 ✓
    quirks:
      # BEST-IN-CLASS tax marking: an explicit per-line RATE column (0% / 10%).
      # Compare: Foodlink uses a "GST" flag; Select Fresh uses an asterisk
