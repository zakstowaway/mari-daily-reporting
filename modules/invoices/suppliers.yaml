      #   46.00 x 10% = 4.60 ✓  (barramundi/squid/tortillas/camembert GST-free)
      # 4 lines where ex == incl, 1 where it doesn't. SELECTIVE errors are
      # harder to spot than total ones.
      tax_is_per_line: true
      tax_marker_column: "GST"

      # Unlike ILG, Foodlink's Fuel Levy IS a real separate line item — and it
      # is GST-taxable. Skip it on the LS receive (extras rule) but do NOT
      # assume freight is already baked into line amounts here.
      fuel_levy_is_separate_line: true
